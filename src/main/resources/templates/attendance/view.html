<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout.html}">
<head>
    <meta charset="UTF-8">
    <title>𝓦𝓸𝓸𝓻𝓲</title>
</head>
<body>

<div layout:fragment="content">
<style>
/* ── 레이아웃 ─────────────────────────────────────────────── */
.att-wrap         { padding: 24px; max-width: 1100px; }
.att-toolbar      { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
.att-title        { font-size: 1.25rem; font-weight: 700; color: var(--text-primary);
                    display: flex; align-items: center; gap: 8px; }
.att-title i      { color: var(--accent-main); }
.att-date-input   { border: 1.5px solid var(--border); border-radius: 8px;
                    padding: 6px 12px; font-size: 0.9rem; background: var(--bg-card);
                    color: var(--text-primary); cursor: pointer; }
.att-manage-btn   { margin-left: auto; padding: 6px 14px; border-radius: 8px; font-size: 0.82rem;
                    background: var(--accent-main); color: #fff; border: none; cursor: pointer;
                    font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
.att-manage-btn:hover { opacity: .88; }

/* 실시간 표시 */
.att-pulse        { width: 8px; height: 8px; border-radius: 50%;
                    background: #22c55e; box-shadow: 0 0 0 0 rgba(34,197,94,.6);
                    animation: att-pulse 1.8s infinite; flex-shrink: 0; }
@keyframes att-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.5)}
                        50%{box-shadow:0 0 0 6px rgba(34,197,94,0)} }
.att-live-txt     { font-size: 0.8rem; color: #22c55e; font-weight: 600; }
.att-updated      { font-size: 0.78rem; color: var(--text-muted); }

/* ── 과정 카드 ────────────────────────────────────────────── */
.att-course       { background: var(--bg-card); border: 1px solid var(--border);
                    border-radius: 12px; margin-bottom: 20px;
                    box-shadow: 0 2px 8px rgba(0,0,0,.06); overflow: hidden; }
.att-course-hd    { padding: 12px 20px;
                    background: linear-gradient(135deg, var(--accent-main), var(--accent-dark));
                    display: flex; align-items: center; justify-content: space-between; }
.att-course-name  { color: #fff; font-size: 0.95rem; font-weight: 700;
                    display: flex; align-items: center; gap: 8px; }
.att-course-time  { color: rgba(255,255,255,.75); font-size: 0.8rem; margin-left: 8px; font-weight: 400; }
.att-course-stats { display: flex; gap: 12px; align-items: center; }
.att-stat         { color: rgba(255,255,255,.9); font-size: 0.8rem;
                    display: flex; align-items: center; gap: 4px; }
.att-stat-dot     { width: 7px; height: 7px; border-radius: 50%; }

/* ── 학생 행 ──────────────────────────────────────────────── */
.att-student-list { padding: 4px 0; }
.att-row          { display: flex; align-items: center; gap: 12px;
                    padding: 10px 20px; border-bottom: 1px solid var(--border-light, var(--border)); }
.att-row:last-child { border-bottom: none; }
.att-row:hover    { background: var(--hover-bg, rgba(0,0,0,.02)); }

/* LED 점 */
.led              { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
.led-absent       { background: #9ca3af; }
.led-present      { background: #22c55e; box-shadow: 0 0 5px rgba(34,197,94,.7);
                    animation: led-glow 1.6s ease-in-out infinite; }
@keyframes led-glow { 0%,100%{box-shadow:0 0 3px rgba(34,197,94,.5)} 50%{box-shadow:0 0 8px rgba(34,197,94,.9)} }
.led-exited       { background: #3b82f6; }
.led-late         { background: #f97316; }

/* 이름 */
.att-name         { flex: 1; font-size: 0.9rem; font-weight: 600; min-width: 80px; }
.att-name.absent  { color: var(--text-muted); font-weight: 400; }

/* 시간 */
.att-time         { width: 60px; font-size: 0.85rem; color: var(--text-muted); text-align: center; }
.att-time.has-val { color: var(--text-primary); }

/* 상태 배지 */
.att-badge        { min-width: 72px; text-align: center; padding: 2px 10px; border-radius: 20px;
                    font-size: 0.75rem; font-weight: 600; }
.badge-absent     { background: rgba(156,163,175,.12); color: #9ca3af; border: 1px solid rgba(156,163,175,.3); }
.badge-present    { background: rgba(34,197,94,.12);  color: #16a34a; border: 1px solid rgba(34,197,94,.3); }
.badge-exited     { background: rgba(59,130,246,.12); color: #1d4ed8; border: 1px solid rgba(59,130,246,.3); }
.badge-late       { background: rgba(249,115,22,.12); color: #c2410c; border: 1px solid rgba(249,115,22,.3); }

/* 헤더 행 */
.att-row-hd       { padding: 7px 20px; background: var(--bg-main);
                    border-bottom: 1px solid var(--border); }
.att-row-hd span  { font-size: 0.75rem; font-weight: 600; color: var(--text-muted);
                    text-transform: uppercase; letter-spacing: .04em; }

/* 빈 상태 */
.att-empty        { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.att-empty i      { font-size: 2.5rem; margin-bottom: 12px; display: block;
                    color: var(--accent-main); opacity: .4; }
.att-empty p      { font-size: 0.9rem; }
</style>

<div class="att-wrap">
    <div class="att-toolbar">
        <div class="att-title"><i class="fas fa-clipboard-check"></i> 출결 현황</div>
        <input type="date" id="dateInput" class="att-date-input">
        <div class="att-pulse"></div>
        <span class="att-live-txt">실시간</span>
        <span class="att-updated" id="lastUpdated">-</span>
        <button class="att-manage-btn" style="background:#10b981" onclick="openManualModal()">
            <i class="fas fa-plus"></i> 수동 입력
        </button>
        <a href="/coolapi/manage" class="att-manage-btn">
            <i class="fas fa-cog"></i> 과정/학생 관리
        </a>
    </div>

    <div id="attContent">
        <div class="att-empty"><i class="fas fa-satellite-dish"></i><p>데이터를 불러오는 중...</p></div>
    </div>
</div>
</div>

<div layout:fragment="script">
<script>
const dateInput = document.getElementById('dateInput');
dateInput.value = new Date().toISOString().slice(0, 10);
dateInput.addEventListener('change', fetchData);

fetchData();
setInterval(fetchData, 3000);

async function fetchData() {
    const date = dateInput.value;
    try {
        const res  = await fetch(`/coolapi/attendance/data?date=${date}`);
        const data = await res.json();
        render(data);
        document.getElementById('lastUpdated').textContent =
            '갱신: ' + new Date().toLocaleTimeString('ko-KR');
    } catch (e) {
        console.error('[출결] 폴링 오류', e);
    }
}

function render(courses) {
    const wrap = document.getElementById('attContent');
    if (!courses || courses.length === 0) {
        wrap.innerHTML = `<div class="att-empty">
            <i class="fas fa-calendar-times"></i>
            <p>해당 날짜에 등록된 과정이 없습니다.</p>
        </div>`;
        return;
    }

    let html = '';
    for (const course of courses) {
        const students = course.students || [];
        const cnt = {
            present: students.filter(s => s.colorClass === 'present').length,
            exited:  students.filter(s => s.colorClass === 'exited').length,
            late:    students.filter(s => s.colorClass === 'late').length,
            absent:  students.filter(s => s.colorClass === 'absent').length,
        };

        const timeRange = (course.checkInTime || course.checkOutTime)
            ? `<span class="att-course-time">${esc(course.checkInTime ?? '?')} ~ ${esc(course.checkOutTime ?? '?')}</span>`
            : '';

        html += `
        <div class="att-course">
            <div class="att-course-hd">
                <span class="att-course-name">
                    <i class="fas fa-chalkboard-teacher"></i>
                    ${esc(course.courseName)}${timeRange}
                </span>
                <div class="att-course-stats">
                    <span class="att-stat"><span class="att-stat-dot" style="background:#22c55e"></span>${cnt.present}명 재원</span>
                    <span class="att-stat"><span class="att-stat-dot" style="background:#3b82f6"></span>${cnt.exited}명 퇴실</span>
                    ${cnt.late > 0 ? `<span class="att-stat"><span class="att-stat-dot" style="background:#f97316"></span>${cnt.late}명 지각/조퇴</span>` : ''}
                    <span class="att-stat"><span class="att-stat-dot" style="background:#9ca3af"></span>${cnt.absent}명 미출석</span>
                    <span class="att-stat" style="border-left:1px solid rgba(255,255,255,.3);padding-left:12px">총 ${students.length}명</span>
                </div>
            </div>
            <div class="att-row-hd" style="display:flex;gap:12px;padding:7px 20px">
                <span style="width:11px"></span>
                <span style="flex:1">이름</span>
                <span style="width:60px;text-align:center">입실</span>
                <span style="width:60px;text-align:center">퇴실</span>
                <span style="min-width:72px;text-align:center">상태</span>
            </div>
            <div class="att-student-list">`;

        if (students.length === 0) {
            html += `<div class="att-row"><span style="color:var(--text-muted);font-size:.85rem">등록된 학생이 없습니다.</span></div>`;
        } else {
            for (const s of students) {
                const cc        = s.colorClass;
                const clickable = cc !== 'absent';
                const nameEl    = clickable
                    ? `<span class="att-name att-name-link" onclick="showLog(${s.studentId},'${esc(s.studentName)}','${esc(course.courseName)}')">${esc(s.studentName)}</span>`
                    : `<span class="att-name absent">${esc(s.studentName)}</span>`;
                html += `
                <div class="att-row">
                    <span class="led led-${cc}"></span>
                    ${nameEl}
                    <span class="att-time ${s.checkIn ? 'has-val' : ''}">${s.checkIn ?? '-'}</span>
                    <span class="att-time ${s.checkOut ? 'has-val' : ''}">${s.checkOut ?? '-'}</span>
                    <span class="att-badge badge-${cc}">${esc(s.statusLabel)}</span>
                </div>`;
            }
        }

        html += `</div></div>`;
    }

    wrap.innerHTML = html;
}

/* ── 학생 기록 모달 ── */
async function showLog(studentId, studentName, courseName) {
    const date = dateInput.value;
    const url  = `/coolapi/attendance/history?studentName=${encodeURIComponent(studentName)}&courseName=${encodeURIComponent(courseName)}&date=${date}`;
    const res  = await fetch(url);
    const logs = await res.json();

    const modal = document.getElementById('attLogModal');
    document.getElementById('attLogTitle').textContent = studentName;
    document.getElementById('attLogCourse').textContent = courseName + ' · ' + date;

    const body = document.getElementById('attLogBody');
    if (!logs.length) {
        body.innerHTML = '<div style="padding:16px;text-align:center;color:#999;font-size:.85rem">기록 없음</div>';
    } else {
        body.innerHTML = logs.map(l => {
            const type    = l.checkOut ? '퇴실' : '입실';
            const typeClr = l.checkOut ? '#3b82f6' : '#22c55e';
            const time    = l.checkOut
                ? `${l.checkIn ?? '-'} → ${l.checkOut}`
                : (l.checkIn ?? '-');
            return `<div style="display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid #f0f0f0">
                <span style="min-width:36px;font-size:.75rem;font-weight:700;color:${typeClr}">${type}</span>
                <span style="font-size:.88rem;color:#222">${time}</span>
            </div>`;
        }).join('');
    }

    modal.classList.add('open');
}

function esc(str) {
    return String(str ?? '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── 수동 입력 모달 ── */
let _manCourses = [];

async function openManualModal() {
    const res = await fetch(`/coolapi/attendance/data?date=${dateInput.value}`);
    _manCourses = await res.json();

    const sel = document.getElementById('manCourse');
    sel.innerHTML = '<option value="">과정 선택...</option>' +
        _manCourses.map(c => `<option value="${esc(c.courseName)}">${esc(c.courseName)}</option>`).join('');
    document.getElementById('manStudent').innerHTML = '<option value="">학생 선택...</option>';

    // 기본 시간: 현재
    const now = new Date();
    document.getElementById('manTime').value =
        String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

    document.getElementById('manModal').classList.add('open');
}

function onManCourseChange() {
    const name = document.getElementById('manCourse').value;
    const course = _manCourses.find(c => c.courseName === name);
    const sel = document.getElementById('manStudent');
    if (!course) { sel.innerHTML = '<option value="">학생 선택...</option>'; return; }
    sel.innerHTML = '<option value="">학생 선택...</option>' +
        (course.students || []).map(s =>
            `<option value="${esc(s.studentName)}">${esc(s.studentName)}</option>`
        ).join('');
}

async function submitManual() {
    const courseName  = document.getElementById('manCourse').value;
    const studentName = document.getElementById('manStudent').value;
    const type        = document.querySelector('input[name="manType"]:checked')?.value;
    const time        = document.getElementById('manTime').value;

    if (!courseName || !studentName || !type) {
        alert('과정, 학생, 유형을 선택하세요.');
        return;
    }

    const res = await fetch('/coolapi/attendance/manual', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ courseName, studentName, type, time: time.replace(':', '') })
    });

    if (res.ok) {
        document.getElementById('manModal').classList.remove('open');
        fetchData();
    } else {
        alert('저장 실패');
    }
}

/* 모달 body 주입 */
document.body.insertAdjacentHTML('beforeend', `
<div id="attLogModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:12px;width:min(380px,92vw);overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)">
    <div style="padding:16px 18px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between">
      <div>
        <div id="attLogTitle" style="font-weight:700;font-size:1rem;color:#111"></div>
        <div id="attLogCourse" style="font-size:.75rem;color:#888;margin-top:2px"></div>
      </div>
      <button onclick="document.getElementById('attLogModal').classList.remove('open')"
              style="background:none;border:none;font-size:1.1rem;cursor:pointer;color:#aaa;line-height:1">✕</button>
    </div>
    <div id="attLogBody" style="max-height:320px;overflow-y:auto"></div>
  </div>
</div>
`);
document.getElementById('attLogModal').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
});

/* 수동 입력 모달 주입 */
document.body.insertAdjacentHTML('beforeend', `
<div id="manModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:14px;width:min(400px,94vw);overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)">
    <div style="padding:16px 18px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between">
      <div style="font-weight:700;font-size:1rem;color:#111">수동 출결 입력 <span style="font-size:.75rem;color:#888;font-weight:400">QR / 비컨</span></div>
      <button onclick="document.getElementById('manModal').classList.remove('open')"
              style="background:none;border:none;font-size:1.1rem;cursor:pointer;color:#aaa">✕</button>
    </div>
    <div style="padding:18px">
      <div style="margin-bottom:12px">
        <label style="display:block;font-size:.78rem;font-weight:700;color:#555;margin-bottom:5px">과정 *</label>
        <select id="manCourse" onchange="onManCourseChange()"
                style="width:100%;padding:8px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:.87rem;background:#fafafa">
          <option value="">과정 선택...</option>
        </select>
      </div>
      <div style="margin-bottom:12px">
        <label style="display:block;font-size:.78rem;font-weight:700;color:#555;margin-bottom:5px">학생 *</label>
        <select id="manStudent"
                style="width:100%;padding:8px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:.87rem;background:#fafafa">
          <option value="">학생 선택...</option>
        </select>
      </div>
      <div style="margin-bottom:12px">
        <label style="display:block;font-size:.78rem;font-weight:700;color:#555;margin-bottom:8px">유형 *</label>
        <div style="display:flex;gap:16px">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:.88rem">
            <input type="radio" name="manType" value="ENTRY" checked> 입실
          </label>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:.88rem">
            <input type="radio" name="manType" value="EXIT"> 퇴실
          </label>
        </div>
      </div>
      <div style="margin-bottom:18px">
        <label style="display:block;font-size:.78rem;font-weight:700;color:#555;margin-bottom:5px">시간 <span style="font-weight:400;color:#aaa">(비워두면 현재 시간)</span></label>
        <input type="time" id="manTime"
               style="padding:8px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:.87rem;background:#fafafa">
      </div>
      <div style="display:flex;justify-content:flex-end;gap:8px">
        <button onclick="document.getElementById('manModal').classList.remove('open')"
                style="padding:8px 16px;border-radius:8px;font-size:.87rem;font-weight:600;background:#f1f1f1;color:#555;border:1.5px solid #ddd;cursor:pointer">취소</button>
        <button onclick="submitManual()"
                style="padding:8px 22px;border-radius:8px;font-size:.87rem;font-weight:700;background:#10b981;color:#fff;border:none;cursor:pointer">저장</button>
      </div>
    </div>
  </div>
</div>
`);
document.getElementById('manModal').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
});
/* open 클래스 → flex 전환 */
const _attStyle = document.createElement('style');
_attStyle.textContent = '#attLogModal.open{display:flex!important} #manModal.open{display:flex!important} .att-name-link{cursor:pointer;text-decoration:underline;text-underline-offset:3px}';
document.head.appendChild(_attStyle);
</script>
</div>

</body>
</html>
