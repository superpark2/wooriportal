<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout.html}">
<head>
    <meta charset="UTF-8">
    <title>𝓦𝓸𝓸𝓻𝓲</title>
</head>
<body>

<div layout:fragment="content">
<style>
/* ── 레이아웃 ─────────────────────────────────────────────── */
.att-wrap         { padding: 24px; max-width: 1360px; margin: 0 auto; }
.att-toolbar      { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.att-title        { font-size: 1.25rem; font-weight: 700; color: var(--text-primary);
                    display: flex; align-items: center; gap: 8px; }
.att-title i      { color: var(--accent-main); }
.att-date-input   { border: 1.5px solid var(--border); border-radius: 8px;
                    padding: 6px 12px; font-size: 0.9rem; background: var(--bg-card);
                    color: var(--text-primary); cursor: pointer; }
.att-manage-btn   { margin-left: auto; padding: 6px 14px; border-radius: 8px; font-size: 0.82rem;
                    background: var(--accent-main); color: #fff; border: none; cursor: pointer;
                    font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
.att-manage-btn:hover { opacity: .88; }

/* 실시간 표시 */
.att-pulse        { width: 8px; height: 8px; border-radius: 50%;
                    background: #22c55e; box-shadow: 0 0 0 0 rgba(34,197,94,.6);
                    animation: att-pulse 1.8s infinite; flex-shrink: 0; }
@keyframes att-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.5)}
                        50%{box-shadow:0 0 0 6px rgba(34,197,94,0)} }
.att-live-txt     { font-size: 0.8rem; color: #22c55e; font-weight: 600; }
.att-updated      { font-size: 0.78rem; color: var(--text-muted); }

/* ── 과정 카드 (그리드: 화면당 2~3개) ─────────────────────── */
#attContent       { display: grid; gap: 16px; align-items: start;
                    grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); }
.att-course       { background: var(--bg-card); border: 1px solid var(--border);
                    border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.06); overflow: hidden; }
.att-course-hd    { padding: 11px 16px;
                    background: linear-gradient(135deg, var(--accent-main), var(--accent-dark)); }
.att-course-name  { color: #fff; font-size: 0.9rem; font-weight: 700; line-height: 1.3;
                    display: flex; align-items: center; gap: 6px; }
.att-course-round { font-size: .7rem; font-weight: 700; background: rgba(255,255,255,.22);
                    color:#fff; padding: 1px 7px; border-radius: 10px; white-space: nowrap; }
/* 요일 + 시간 — 과정명 한 줄 아래 */
.att-course-meta  { color: rgba(255,255,255,.82); font-size: 0.74rem; margin-top: 5px; }
.att-course-stats { display: flex; flex-wrap: wrap; gap: 6px 12px; align-items: center;
                    padding: 8px 16px; background: var(--bg-main); border-bottom: 1px solid var(--border); }
.att-stat         { color: var(--text-muted); font-size: 0.73rem;
                    display: flex; align-items: center; gap: 4px; }
.att-stat-dot     { width: 7px; height: 7px; border-radius: 50%; }

/* ── 학생 행 ──────────────────────────────────────────────── */
.att-student-list { padding: 2px 0; }
.att-row          { display: flex; align-items: center; gap: 8px;
                    padding: 8px 14px; border-bottom: 1px solid var(--border-light, var(--border)); }
.att-row:last-child { border-bottom: none; }
.att-row:hover    { background: var(--hover-bg, rgba(0,0,0,.02)); }

/* 행 액션 버튼 (QR / 비컨 / 취소) */
.att-acts         { display: flex; gap: 3px; flex-shrink: 0; }
.att-act          { border: none; border-radius: 6px; padding: 3px 7px; font-size: .68rem;
                    font-weight: 700; cursor: pointer; line-height: 1.25; white-space: nowrap; }
.att-act-qr       { background: #eef2ff; color: #4f46e5; }
.att-act-bc       { background: #ecfeff; color: #0891b2; }
.att-act-x        { background: #fef2f2; color: #dc2626; }
.att-act:hover    { filter: brightness(.94); }

/* LED 점 */
.led              { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
.led-absent       { background: #9ca3af; }
.led-present      { background: #22c55e; box-shadow: 0 0 5px rgba(34,197,94,.7);
                    animation: led-glow 1.6s ease-in-out infinite; }
@keyframes led-glow { 0%,100%{box-shadow:0 0 3px rgba(34,197,94,.5)} 50%{box-shadow:0 0 8px rgba(34,197,94,.9)} }
.led-exited       { background: #3b82f6; }
.led-late         { background: #f97316; }

/* 이름 */
.att-name         { flex: 1; font-size: 0.85rem; font-weight: 600; min-width: 52px;
                    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.att-name.absent  { color: var(--text-muted); font-weight: 400; }

/* 시간 */
.att-time         { width: 38px; font-size: 0.76rem; color: var(--text-muted); text-align: center; }
.att-time.has-val { color: var(--text-primary); }

/* 상태 배지 */
.att-badge        { min-width: 48px; text-align: center; padding: 2px 6px; border-radius: 20px;
                    font-size: 0.7rem; font-weight: 600; }
.badge-absent     { background: rgba(156,163,175,.12); color: #9ca3af; border: 1px solid rgba(156,163,175,.3); }
.badge-present    { background: rgba(34,197,94,.12);  color: #16a34a; border: 1px solid rgba(34,197,94,.3); }
.badge-exited     { background: rgba(59,130,246,.12); color: #1d4ed8; border: 1px solid rgba(59,130,246,.3); }
.badge-late       { background: rgba(249,115,22,.12); color: #c2410c; border: 1px solid rgba(249,115,22,.3); }

/* 헤더 행 */
.att-row-hd       { padding: 7px 20px; background: var(--bg-main);
                    border-bottom: 1px solid var(--border); }
.att-row-hd span  { font-size: 0.75rem; font-weight: 600; color: var(--text-muted);
                    text-transform: uppercase; letter-spacing: .04em; }

/* 빈 상태 */
.att-empty        { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.att-empty i      { font-size: 2.5rem; margin-bottom: 12px; display: block;
                    color: var(--accent-main); opacity: .4; }
.att-empty p      { font-size: 0.9rem; }
</style>

<div class="att-wrap">
    <div class="att-toolbar">
        <div class="att-title"><i class="fas fa-clipboard-check"></i> 출결 현황</div>
        <input type="date" id="dateInput" class="att-date-input">
        <div class="att-pulse"></div>
        <span class="att-live-txt">실시간</span>
        <span class="att-updated" id="lastUpdated">-</span>
        <a href="/coolapi/manage" class="att-manage-btn" style="margin-left:auto">
            <i class="fas fa-cog"></i> 과정/학생 관리
        </a>
    </div>

    <div id="attContent">
        <div class="att-empty"><i class="fas fa-satellite-dish"></i><p>데이터를 불러오는 중...</p></div>
    </div>
</div>
</div>

<div layout:fragment="script">
<script>
const dateInput = document.getElementById('dateInput');
dateInput.value = new Date().toISOString().slice(0, 10);
dateInput.addEventListener('change', fetchData);

fetchData();
setInterval(fetchData, 3000);

async function fetchData() {
    const date = dateInput.value;
    try {
        const res  = await fetch(`/coolapi/attendance/data?date=${date}`);
        const data = await res.json();
        render(data);
        document.getElementById('lastUpdated').textContent =
            '갱신: ' + new Date().toLocaleTimeString('ko-KR');
    } catch (e) {
        console.error('[출결] 폴링 오류', e);
    }
}

function render(courses) {
    const wrap = document.getElementById('attContent');
    if (!courses || courses.length === 0) {
        wrap.innerHTML = `<div class="att-empty" style="grid-column:1/-1">
            <i class="fas fa-calendar-times"></i>
            <p>해당 날짜에 등록된 과정이 없습니다.</p>
        </div>`;
        return;
    }

    let html = '';
    for (const course of courses) {
        const students = course.students || [];
        const cnt = {
            present: students.filter(s => s.colorClass === 'present').length,
            exited:  students.filter(s => s.colorClass === 'exited').length,
            late:    students.filter(s => s.colorClass === 'late').length,
            absent:  students.filter(s => s.colorClass === 'absent').length,
        };

        const round      = course.round || 0;
        const roundBadge = round > 0 ? `<span class="att-course-round">회차 ${round}</span>` : '';
        const timeStr    = (course.checkInTime || course.checkOutTime)
            ? `${course.checkInTime ?? '?'} ~ ${course.checkOutTime ?? '?'}` : '';
        const meta = [daysLabel(course.daysOfWeek), timeStr].filter(Boolean).join(' · ');

        html += `
        <div class="att-course">
            <div class="att-course-hd">
                <div class="att-course-name">
                    <i class="fas fa-chalkboard-teacher"></i>
                    <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(course.courseName)}</span>
                    ${roundBadge}
                </div>
                <div class="att-course-meta">${esc(meta)}</div>
            </div>
            <div class="att-course-stats">
                <span class="att-stat"><span class="att-stat-dot" style="background:#22c55e"></span>${cnt.present} 재원</span>
                <span class="att-stat"><span class="att-stat-dot" style="background:#3b82f6"></span>${cnt.exited} 퇴실</span>
                ${cnt.late > 0 ? `<span class="att-stat"><span class="att-stat-dot" style="background:#f97316"></span>${cnt.late} 지각/조퇴</span>` : ''}
                <span class="att-stat"><span class="att-stat-dot" style="background:#9ca3af"></span>${cnt.absent} 미출석</span>
                <span class="att-stat" style="margin-left:auto;font-weight:700;color:var(--text-primary)">총 ${students.length}명</span>
            </div>
            <div class="att-student-list">`;

        if (students.length === 0) {
            html += `<div class="att-row"><span style="color:var(--text-muted);font-size:.82rem">등록된 학생이 없습니다.</span></div>`;
        } else {
            for (const s of students) {
                const cc   = s.colorClass;
                const pure = pureName(s.studentName);
                const nextType = s.checkIn ? 'EXIT' : 'ENTRY';   // 입실 전이면 입실, 후면 퇴실
                const nameEl = (cc !== 'absent')
                    ? `<span class="att-name att-name-link" onclick="showLog(${s.studentId},'${esc(pure)}','${esc(course.courseName)}',${round})">${esc(s.studentName)}</span>`
                    : `<span class="att-name absent">${esc(s.studentName)}</span>`;
                html += `
                <div class="att-row">
                    <span class="led led-${cc}"></span>
                    ${nameEl}
                    <span class="att-time ${s.checkIn ? 'has-val' : ''}">${s.checkIn ?? '-'}</span>
                    <span class="att-time ${s.checkOut ? 'has-val' : ''}">${s.checkOut ?? '-'}</span>
                    <span class="att-badge badge-${cc}">${esc(s.statusLabel)}</span>
                    <span class="att-acts">
                        <button class="att-act att-act-qr" title="QR ${nextType === 'EXIT' ? '퇴실' : '입실'}"
                            onclick="markAtt('${esc(pure)}','${esc(course.courseName)}',${round},'QR','${nextType}')">QR</button>
                        <button class="att-act att-act-bc" title="비컨 ${nextType === 'EXIT' ? '퇴실' : '입실'}"
                            onclick="markAtt('${esc(pure)}','${esc(course.courseName)}',${round},'BEACON','${nextType}')">비컨</button>
                        <button class="att-act att-act-x" title="당일 출결 취소"
                            onclick="cancelAtt('${esc(pure)}','${esc(course.courseName)}',${round})">✕</button>
                    </span>
                </div>`;
            }
        }

        html += `</div></div>`;
    }

    wrap.innerHTML = html;
}

/** "1,2,3,4,5" → "월화수목금" */
function daysLabel(dow) {
    if (!dow) return '';
    const names = {1:'월',2:'화',3:'수',4:'목',5:'금',6:'토',7:'일'};
    return dow.split(',').map(d => names[d.trim()] || '').filter(Boolean).join('');
}
/** 표시이름에서 "(생년월일)" 접미어 제거 → 서버 매칭용 순수 이름 */
function pureName(n) { return String(n ?? '').replace(/\s*\(.*\)\s*$/, '').trim(); }

/* ── 행 액션: QR / 비컨 출결, 취소 ── */
async function markAtt(name, courseName, round, method, type) {
    const res = await fetch('/coolapi/attendance/manual', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ courseName, round, studentName: name, type, method, time: '' })
    });
    if (res.ok) fetchData(); else alert('처리 실패');
}
async function cancelAtt(name, courseName, round) {
    if (!confirm(`'${name}' 의 오늘 출결 기록을 취소(삭제)할까요?`)) return;
    const res = await fetch('/coolapi/attendance/cancel', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ courseName, round, studentName: name })
    });
    if (res.ok) fetchData(); else alert('취소 실패');
}

/* ── 학생 기록 모달 ── */
let _curLog = { name:'', course:'', round:0, date:'' };
async function showLog(studentId, studentName, courseName, round) {
    const date = dateInput.value;
    round = round || 0;
    _curLog = { name: studentName, course: courseName, round: round, date: date };
    const url  = `/coolapi/attendance/history?studentName=${encodeURIComponent(studentName)}&courseName=${encodeURIComponent(courseName)}&round=${round}&date=${date}`;
    const res  = await fetch(url);
    const logs = await res.json();

    const modal = document.getElementById('attLogModal');
    document.getElementById('attLogTitle').textContent = studentName;
    document.getElementById('attLogCourse').textContent = courseName + (round > 0 ? ' · 회차 ' + round : '');
    document.getElementById('attLogDate').textContent = date;          // 날짜는 한 줄 아래
    document.getElementById('attEditArea').style.display = 'none';      // 수정 영역 접기
    document.getElementById('editCi').value = '';
    document.getElementById('editCo').value = '';

    const body = document.getElementById('attLogBody');
    if (!logs.length) {
        body.innerHTML = '<div style="padding:16px;text-align:center;color:#999;font-size:.85rem">기록 없음</div>';
    } else {
        body.innerHTML = logs.map(l => {
            const type    = l.checkOut ? '퇴실' : '입실';
            const typeClr = l.checkOut ? '#3b82f6' : '#22c55e';
            const time    = l.checkOut
                ? `${l.checkIn ?? '-'} → ${l.checkOut}`
                : (l.checkIn ?? '-');
            return `<div style="display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid #f0f0f0">
                <span style="min-width:36px;font-size:.75rem;font-weight:700;color:${typeClr}">${type}</span>
                <span style="font-size:.88rem;color:#222">${time}</span>
            </div>`;
        }).join('');
    }

    modal.classList.add('open');
}

function esc(str) {
    return String(str ?? '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── 수정(시간 보정) ── */
function toggleEdit() {
    const a = document.getElementById('attEditArea');
    a.style.display = (a.style.display === 'none' || !a.style.display) ? 'block' : 'none';
}
async function editSave() {
    const ci = document.getElementById('editCi').value;   // "HH:mm" or ''
    const co = document.getElementById('editCo').value;
    const { name, course, round } = _curLog;
    // 당일 기록을 입력값으로 교체: 먼저 취소(삭제) 후 재등록
    await fetch('/coolapi/attendance/cancel', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ courseName: course, round, studentName: name })
    });
    if (ci) await fetch('/coolapi/attendance/manual', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ courseName: course, round, studentName: name, type:'ENTRY', method:'MANUAL', time: ci.replace(':','') })
    });
    if (co) await fetch('/coolapi/attendance/manual', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ courseName: course, round, studentName: name, type:'EXIT', method:'MANUAL', time: co.replace(':','') })
    });
    document.getElementById('attLogModal').classList.remove('open');
    fetchData();
}

/* 학생 기록 모달 주입 (날짜 한 줄 아래 + 수정 버튼/영역) */
document.body.insertAdjacentHTML('beforeend', `
<div id="attLogModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:12px;width:min(380px,92vw);overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)">
    <div style="padding:16px 18px;border-bottom:1px solid #eee;display:flex;align-items:flex-start;justify-content:space-between">
      <div>
        <div id="attLogTitle" style="font-weight:700;font-size:1rem;color:#111"></div>
        <div id="attLogCourse" style="font-size:.75rem;color:#888;margin-top:3px"></div>
        <div id="attLogDate" style="font-size:.72rem;color:#aaa;margin-top:1px"></div>
      </div>
      <button onclick="document.getElementById('attLogModal').classList.remove('open')"
              style="background:none;border:none;font-size:1.1rem;cursor:pointer;color:#aaa;line-height:1">✕</button>
    </div>
    <div id="attLogBody" style="max-height:280px;overflow-y:auto"></div>
    <div id="attEditArea" style="display:none;padding:12px 16px;border-top:1px solid #eee;background:#fafafa">
      <div style="display:flex;gap:10px;margin-bottom:8px">
        <label style="flex:1;font-size:.72rem;font-weight:700;color:#555">입실
          <input type="time" id="editCi" style="width:100%;margin-top:3px;padding:6px;border:1.5px solid #ddd;border-radius:6px;font-size:.85rem"></label>
        <label style="flex:1;font-size:.72rem;font-weight:700;color:#555">퇴실
          <input type="time" id="editCo" style="width:100%;margin-top:3px;padding:6px;border:1.5px solid #ddd;border-radius:6px;font-size:.85rem"></label>
      </div>
      <div style="font-size:.68rem;color:#999;margin-bottom:8px">저장 시 오늘 기록을 입력값으로 교체합니다 (비우면 해당 시간 없음).</div>
      <button onclick="editSave()" style="width:100%;padding:8px;border:none;border-radius:8px;background:#4f46e5;color:#fff;font-weight:700;cursor:pointer">저장</button>
    </div>
    <div style="padding:10px 16px;border-top:1px solid #eee;display:flex;justify-content:flex-end">
      <button onclick="toggleEdit()"
              style="padding:7px 16px;border-radius:8px;font-size:.82rem;font-weight:700;background:#eef2ff;color:#4f46e5;border:none;cursor:pointer">
        <i class="fas fa-pen"></i> 수정
      </button>
    </div>
  </div>
</div>
`);
document.getElementById('attLogModal').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
});
/* open 클래스 → flex 전환 */
const _attStyle = document.createElement('style');
_attStyle.textContent = '#attLogModal.open{display:flex!important} .att-name-link{cursor:pointer;text-decoration:underline;text-underline-offset:3px}';
document.head.appendChild(_attStyle);
</script>
</div>

</body>
</html>
