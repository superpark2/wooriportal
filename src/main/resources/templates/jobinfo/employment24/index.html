<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>채용 정보 시스템</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root{--bg:#0a0a0f;--sf:#111118;--sf2:#16161f;--bd:#1e1e2e;--bd2:#2a2a3e;--ac:#ff5c35;--ac2:#e84d2a;--bl:#3b82f6;--bl2:#60a5fa;--gn:#22c55e;--tx:#e8e8f0;--tx2:#8888a8;--tx3:#4a4a6a;--sh:rgba(0,0,0,.45);--mono:'JetBrains Mono',monospace;--sans:'Noto Sans KR',sans-serif}
    html.light{--bg:#f0f0f6;--sf:#ffffff;--sf2:#e8e8f2;--bd:#d8d8e8;--bd2:#c0c0d8;--ac:#ff5c35;--ac2:#e84d2a;--bl:#2563eb;--bl2:#1d4ed8;--gn:#16a34a;--tx:#111122;--tx2:#555570;--tx3:#9090b0;--sh:rgba(0,0,0,.1)}
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--tx);font-family:var(--sans);min-height:100vh;overflow-x:hidden;transition:background .25s,color .25s}
    /* 헤더 */
    .hdr{position:relative;z-index:10;padding:16px 28px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:12px;background:var(--sf);transition:background .25s,border-color .25s}
    .logo{width:36px;height:36px;background:var(--ac);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;font-family:var(--mono);flex-shrink:0}
    .hdr-title{font-size:17px;font-weight:700;letter-spacing:-.4px}
    .hdr-sub{font-size:12px;color:var(--tx2);font-family:var(--mono);margin-top:1px}
    .hdr-r{margin-left:auto;display:flex;align-items:center;gap:8px}
    .live{background:rgba(255,92,53,.12);border:1px solid rgba(255,92,53,.3);color:var(--ac);font-size:12px;font-family:var(--mono);padding:3px 8px;border-radius:5px;letter-spacing:.5px}
    .theme-btn{width:30px;height:30px;border:1px solid var(--bd2);background:var(--sf2);border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;color:var(--tx2)}
    .theme-btn:hover{border-color:var(--ac);color:var(--ac)}
    /* 레이아웃 */
    .layout{display:grid;grid-template-columns:360px 1fr;height:calc(100vh - 69px);position:relative;z-index:1}
    /* 사이드바 */
    .side{border-right:1px solid var(--bd);overflow-y:auto;background:var(--sf);scrollbar-width:thin;scrollbar-color:var(--bd2) transparent;transition:background .25s,border-color .25s}
    .side::-webkit-scrollbar{width:3px}
    .side::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
    /* 섹션 */
    .sec{border-bottom:1px solid var(--bd);transition:border-color .25s}
    .sec-hdr{padding:11px 16px;display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none;transition:background .15s}
    .sec-hdr:hover{background:rgba(128,128,128,.05)}
    .sec-lbl{font-size:12px;font-weight:700;letter-spacing:1.2px;color:var(--tx2);text-transform:uppercase;flex:1}
    .sec-ic{font-size:11px;color:var(--tx3);transition:transform .2s}
    .sec.open .sec-ic{transform:rotate(180deg)}
    .sec-body{padding:0 16px 13px;display:none}
    .sec.open .sec-body{display:block}
    /* 필터 */
    .fg{margin-bottom:10px}
    .fg-lbl{font-size:12px;color:var(--tx3);font-family:var(--mono);margin-bottom:6px;letter-spacing:.4px}
    .cg{display:flex;flex-wrap:wrap;gap:4px}
    .chip{display:inline-flex;align-items:center;gap:4px;padding:4px 9px;border-radius:5px;border:1px solid var(--bd2);background:var(--sf2);font-size:13px;color:var(--tx2);cursor:pointer;transition:all .15s;user-select:none}
    .chip:hover{border-color:var(--ac);color:var(--tx)}
    .chip input{display:none}
    .chip.on{background:rgba(255,92,53,.12);border-color:var(--ac);color:var(--ac);font-weight:600}
    .sw{position:relative}
    select{width:100%;background:var(--sf2);border:1px solid var(--bd2);border-radius:7px;color:var(--tx);padding:7px 28px 7px 10px;font-size:14px;font-family:var(--sans);outline:none;cursor:pointer;appearance:none;transition:border-color .15s,background .25s,color .25s}
    select:focus{border-color:var(--ac)}
    .sa{position:absolute;right:8px;top:50%;transform:translateY(-50%);color:var(--tx3);pointer-events:none;font-size:10px}
    /* 지역 칩 (다중선택) */
    .loc-chips{display:flex;flex-wrap:wrap;gap:4px}
    .loc-chip{padding:3px 8px;border-radius:5px;border:1px solid var(--bd2);background:transparent;font-size:13px;color:var(--tx3);cursor:pointer;transition:all .12s;user-select:none}
    .loc-chip:hover{border-color:var(--bl);color:var(--bl2)}
    .loc-chip.on{background:rgba(59,130,246,.15);border-color:var(--bl);color:var(--bl2);font-weight:600}
    /* 직무 트리 */
    .job-tree{max-height:320px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bd2) transparent}
    .jcat{margin-bottom:2px}
    .jcat-row{display:flex;align-items:center;border-radius:6px;overflow:hidden}
    .jcat-ck{display:flex;align-items:center;justify-content:center;width:30px;height:30px;cursor:pointer;flex-shrink:0;transition:background .15s;border-radius:6px}
    .jcat-ck:hover{background:rgba(255,92,53,.1)}
    .jcat-ck input{display:none}
    .ck-box{width:13px;height:13px;border:1.5px solid var(--bd2);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;transition:all .15s;background:var(--sf2)}
    .jcat-ck input:checked+.ck-box{background:var(--ac);border-color:var(--ac);color:#fff}
    .jcat-ck.partial .ck-box{background:rgba(255,92,53,.25);border-color:var(--ac)}
    .jcat-hdr{flex:1;display:flex;align-items:center;gap:5px;padding:4px 7px;cursor:pointer;font-size:13px;font-weight:600;color:var(--tx2);transition:all .15s;border-radius:0 6px 6px 0}
    .jcat-hdr:hover{background:rgba(128,128,128,.07);color:var(--tx)}
    .jcat-tog{font-size:9px;color:var(--tx3);transition:transform .15s}
    .jcat.open .jcat-tog{transform:rotate(90deg)}
    .jcat-cnt{margin-left:auto;background:var(--ac);color:#fff;font-size:11px;font-weight:700;min-width:15px;height:15px;border-radius:8px;display:none;align-items:center;justify-content:center;font-family:var(--mono);padding:0 3px}
    .jcat-cnt.show{display:flex}
    .jkws{display:none;padding:3px 0 3px 30px}
    .jcat.open .jkws{display:block}
    .kw-grid{display:flex;flex-wrap:wrap;gap:3px}
    .kw{padding:2px 7px;border-radius:4px;border:1px solid var(--bd2);background:transparent;font-size:12px;color:var(--tx3);cursor:pointer;transition:all .12s;user-select:none}
    .kw:hover{border-color:var(--bl);color:var(--bl2)}
    .kw.on{background:rgba(59,130,246,.15);border-color:var(--bl);color:var(--bl2);font-weight:600}
    /* 선택카운트 뱃지 */
    .cnt{display:none;background:var(--ac);color:#fff;font-size:11px;font-weight:700;width:16px;height:16px;border-radius:50%;align-items:center;justify-content:center;font-family:var(--mono)}
    .cnt.show{display:flex}
    /* URL 미리보기 */
    .url-box{margin:12px 16px;background:var(--sf2);border:1px solid var(--bd2);border-radius:7px;padding:10px;transition:background .25s,border-color .25s}
    .url-lbl{font-size:11px;color:var(--tx3);font-family:var(--mono);letter-spacing:1px;margin-bottom:4px}
    .url-txt{font-family:var(--mono);font-size:12px;color:var(--bl2);word-break:break-all;line-height:1.6;max-height:64px;overflow-y:auto}
    /* 검색 버튼 */
    .srch-btn{margin:0 16px 16px;width:calc(100% - 32px);background:var(--ac);color:#fff;border:none;border-radius:9px;padding:12px;font-size:15px;font-weight:700;font-family:var(--sans);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;letter-spacing:-.3px;position:relative;overflow:hidden}
    .srch-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.12) 0%,transparent 60%)}
    .srch-btn:hover{background:var(--ac2);transform:translateY(-1px);box-shadow:0 8px 24px rgba(255,92,53,.35)}
    .srch-btn:active{transform:translateY(0)}
    .srch-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
    /* 메인 */
    .main{overflow-y:auto;display:flex;flex-direction:column;background:var(--bg);transition:background .25s}
    .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--tx3)}
    .empty-ic{font-size:48px;opacity:.35}
    .empty-ttl{font-size:17px;font-weight:700;color:var(--tx2)}
    .empty-sub{font-size:14px;color:var(--tx3);text-align:center;line-height:1.7}
    /* 결과 헤더 */
    .res-hdr{padding:16px 24px 13px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:9px;flex-wrap:wrap;background:var(--sf);transition:background .25s,border-color .25s}
    .res-n{font-size:21px;font-weight:900;color:var(--ac)}
    .res-lbl{font-size:14px;color:var(--tx2)}
    .res-link{margin-left:auto;background:transparent;border:1px solid var(--bd2);color:var(--tx2);font-size:12px;font-family:var(--mono);padding:5px 10px;border-radius:5px;cursor:pointer;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
    .res-link:hover{border-color:var(--bl);color:var(--bl2)}
    /* 그리드 */
    .grid{padding:16px 24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}
    /* 카드 */
    .card{background:var(--sf);border:1px solid var(--bd);border-radius:11px;padding:16px;transition:all .2s;position:relative;overflow:hidden;cursor:pointer;text-decoration:none;color:inherit;display:block}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--ac),var(--bl));opacity:0;transition:opacity .2s}
    .card:hover{border-color:var(--bd2);transform:translateY(-2px);box-shadow:0 10px 28px var(--sh)}
    .card:hover::before{opacity:1}
    .c-badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 6px;border-radius:3px;background:rgba(255,92,53,.1);color:var(--ac);border:1px solid rgba(255,92,53,.2);margin-bottom:8px;font-family:var(--mono);letter-spacing:.4px}
    .c-co{font-size:13px;color:var(--tx2);margin-bottom:4px;display:flex;align-items:center;gap:5px}
    .c-co::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--gn);flex-shrink:0}
    .c-ttl{font-size:15px;font-weight:700;line-height:1.45;color:var(--tx);margin-bottom:11px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .c-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:11px}
    .c-tag{font-size:12px;padding:2px 7px;border-radius:3px;background:var(--sf2);color:var(--tx2);border:1px solid var(--bd2)}
    .c-tag.gn{color:var(--gn)}
    .c-ft{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--bd)}
    .c-dl{font-size:12px;color:var(--tx3);font-family:var(--mono)}
    .c-arr{width:24px;height:24px;border-radius:6px;background:var(--sf2);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--tx3);transition:all .15s}
    .card:hover .c-arr{background:var(--ac);color:#fff}
    /* 로딩 */
    .ld{display:none;position:fixed;inset:0;background:rgba(10,10,15,.8);backdrop-filter:blur(4px);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:16px}
    .ld.on{display:flex}
    .spin{width:42px;height:42px;border:3px solid var(--bd2);border-top-color:var(--ac);border-radius:50%;animation:sp .7s linear infinite}
    @keyframes sp{to{transform:rotate(360deg)}}
    .ld-txt{font-family:var(--mono);font-size:14px;color:var(--tx2)}
    /* 에러 */
    .err-box{margin:16px 24px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:9px;padding:14px 16px;display:flex;align-items:flex-start;gap:10px}
    .err-ic{font-size:17px;color:#ef4444;flex-shrink:0}
    .err-msg{font-size:14px;color:#fca5a5;line-height:1.55}
    .xl-btn{display:none;align-items:center;gap:5px;padding:5px 12px;border-radius:7px;border:1px solid rgba(34,197,94,.4);background:rgba(34,197,94,.1);color:var(--gn);font-size:13px;font-weight:700;font-family:var(--mono);cursor:pointer;transition:all .2s;letter-spacing:.3px}
    .xl-btn:hover{background:rgba(34,197,94,.22);border-color:var(--gn);transform:translateY(-1px);box-shadow:0 4px 14px rgba(34,197,94,.25)}
    .xl-btn.show{display:flex}
    .xl-btn:active{transform:translateY(0)}
    .stop-btn{display:none;align-items:center;gap:5px;padding:5px 12px;border-radius:7px;border:1px solid rgba(239,68,68,.4);background:rgba(239,68,68,.1);color:#ef4444;font-size:13px;font-weight:700;font-family:var(--mono);cursor:pointer;transition:all .2s}
    .stop-btn:hover{background:rgba(239,68,68,.22);border-color:#ef4444}
    .stop-btn.show{display:flex}
    .xl-progress{display:none;font-size:12px;color:var(--tx3);font-family:var(--mono);align-items:center;gap:6px}
    .xl-progress.show{display:flex}
    .xl-bar{width:80px;height:5px;background:var(--bd2);border-radius:3px;overflow:hidden}
    .xl-bar-fill{height:100%;background:var(--gn);border-radius:3px;transition:width .3s;width:0%}
    .pgn{display:flex;align-items:center;justify-content:center;gap:5px;padding:20px 24px 28px;flex-wrap:wrap}
    .pgn-btn{min-width:34px;height:34px;padding:0 8px;border-radius:7px;border:1px solid var(--bd2);background:var(--sf2);color:var(--tx2);font-size:14px;font-family:var(--mono);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
    .pgn-btn:hover:not(:disabled){border-color:var(--ac);color:var(--ac)}
    .pgn-btn.on{background:var(--ac);border-color:var(--ac);color:#fff;font-weight:700}
    .pgn-btn:disabled{opacity:.35;cursor:not-allowed}
    .pgn-ellipsis{color:var(--tx3);font-size:13px;padding:0 4px}
    .pgn-info{font-size:12px;color:var(--tx3);font-family:var(--mono);margin-left:8px}
    .nav-link{padding:5px 11px;border-radius:7px;border:1px solid var(--bd2);background:var(--sf2);color:var(--tx2);font-size:12px;font-weight:600;text-decoration:none;transition:all .15s;font-family:var(--mono)}
    .nav-link:hover{border-color:var(--bl);color:var(--bl2)}
  </style>
</head>
<body>
<header class="hdr">
  <div class="logo">24</div>
  <div>
    <div class="hdr-title">고용24 채용정보</div>
    <div class="hdr-sub">work24.go.kr · 워크넷</div>
  </div>
  <div class="hdr-r">
    <div class="xl-progress" id="xlProgress">
      <div class="xl-bar"><div class="xl-bar-fill" id="xlBarFill"></div></div>
      <span id="xlProgressTxt">0/0p</span>
    </div>
    <button class="stop-btn" id="stopBtn" onclick="cancelExport()"><span>⏹</span><span>중단</span></button>
    <button class="xl-btn" id="xlBtn" onclick="exportExcel()"><span>📊</span><span>EXCEL 저장</span></button>
    <a href="/jobinfo/jobkorea" class="nav-link">잡코리아</a>
    <a href="/jobinfo/saramin" class="nav-link">사람인</a>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="테마 전환">☀️</button>
  </div>
</header>

<div class="layout">
  <aside class="side">

    <!-- 검색어 -->
    <div class="sec open" id="s-kw">
      <div class="sec-hdr" onclick="tog('s-kw')"><span class="sec-lbl">🔍 검색어</span><span class="sec-ic">▾</span></div>
      <div class="sec-body">
        <input type="text" id="kw" placeholder="예) 개발, 사무, 운전" onkeydown="if(event.key==='Enter'){currentPage=1;doSearch()}" oninput="updUrl()"
               style="width:100%;background:var(--sf2);border:1px solid var(--bd2);border-radius:7px;color:var(--tx);padding:8px 10px;font-size:14px;font-family:var(--sans);outline:none">
      </div>
    </div>

    <!-- 지역 -->
    <div class="sec open" id="s-loc">
      <div class="sec-hdr" onclick="tog('s-loc')"><span class="sec-lbl">📍 근무 지역</span><span class="cnt" id="c-loc"></span><span class="sec-ic">▾</span></div>
      <div class="sec-body">
        <div class="sw">
          <select id="regSel" onchange="onRegion()">
            <option value="">전국</option>
            <option value="11000">서울</option><option value="41000">경기</option><option value="28000">인천</option>
            <option value="26000">부산</option><option value="27000">대구</option><option value="29000">광주</option>
            <option value="30000">대전</option><option value="31000">울산</option><option value="36110">세종</option>
            <option value="51000">강원</option><option value="43000">충북</option><option value="44000">충남</option>
            <option value="52000">전북</option><option value="46000">전남</option><option value="47000">경북</option>
            <option value="48000">경남</option><option value="50000">제주</option>
          </select>
          <span class="sa">▾</span>
        </div>
      </div>
    </div>

    <!-- 경력 -->
    <div class="sec open" id="s-car">
      <div class="sec-hdr" onclick="tog('s-car')"><span class="sec-lbl">👤 경력</span><span class="cnt" id="c-car"></span><span class="sec-ic">▾</span></div>
      <div class="sec-body"><div class="cg">
        <label class="chip"><input type="checkbox" name="car" value="N" onchange="ckChg(this,'c-car','car')"><span>신입</span></label>
        <label class="chip"><input type="checkbox" name="car" value="E" onchange="ckChg(this,'c-car','car')"><span>경력</span></label>
        <label class="chip"><input type="checkbox" name="car" value="Z" onchange="ckChg(this,'c-car','car')"><span>관계없음</span></label>
      </div></div>
    </div>

    <!-- 고용형태 -->
    <div class="sec" id="s-emp">
      <div class="sec-hdr" onclick="tog('s-emp')"><span class="sec-lbl">💼 고용형태</span><span class="cnt" id="c-emp"></span><span class="sec-ic">▾</span></div>
      <div class="sec-body"><div class="cg">
        <label class="chip"><input type="checkbox" name="emp" value="10" onchange="ckChg(this,'c-emp','emp')"><span>정규(기간없음)</span></label>
        <label class="chip"><input type="checkbox" name="emp" value="11" onchange="ckChg(this,'c-emp','emp')"><span>정규·시간선택</span></label>
        <label class="chip"><input type="checkbox" name="emp" value="20" onchange="ckChg(this,'c-emp','emp')"><span>계약(기간있음)</span></label>
        <label class="chip"><input type="checkbox" name="emp" value="21" onchange="ckChg(this,'c-emp','emp')"><span>계약·시간선택</span></label>
        <label class="chip"><input type="checkbox" name="emp" value="4" onchange="ckChg(this,'c-emp','emp')"><span>파견근로</span></label>
      </div></div>
    </div>

    <!-- 기업형태 -->
    <div class="sec" id="s-ent">
      <div class="sec-hdr" onclick="tog('s-ent')"><span class="sec-lbl">🏢 기업형태</span><span class="cnt" id="c-ent"></span><span class="sec-ic">▾</span></div>
      <div class="sec-body"><div class="cg">
        <label class="chip"><input type="checkbox" name="ent" value="01" onchange="ckChg(this,'c-ent','ent')"><span>대기업</span></label>
        <label class="chip"><input type="checkbox" name="ent" value="20" onchange="ckChg(this,'c-ent','ent')"><span>중견기업</span></label>
        <label class="chip"><input type="checkbox" name="ent" value="04" onchange="ckChg(this,'c-ent','ent')"><span>공무원·공기업</span></label>
        <label class="chip"><input type="checkbox" name="ent" value="05" onchange="ckChg(this,'c-ent','ent')"><span>외국계</span></label>
        <label class="chip"><input type="checkbox" name="ent" value="06" onchange="ckChg(this,'c-ent','ent')"><span>코스피</span></label>
        <label class="chip"><input type="checkbox" name="ent" value="07" onchange="ckChg(this,'c-ent','ent')"><span>코스닥</span></label>
        <label class="chip"><input type="checkbox" name="ent" value="09" onchange="ckChg(this,'c-ent','ent')"><span>일학습병행</span></label>
        <label class="chip"><input type="checkbox" name="ent" value="10" onchange="ckChg(this,'c-ent','ent')"><span>청년친화강소</span></label>
        <label class="chip"><input type="checkbox" name="ent" value="11" onchange="ckChg(this,'c-ent','ent')"><span>가족친화인증</span></label>
      </div></div>
    </div>

    <!-- 학력 -->
    <div class="sec" id="s-edu">
      <div class="sec-hdr" onclick="tog('s-edu')"><span class="sec-lbl">🎓 학력</span><span class="cnt" id="c-edu"></span><span class="sec-ic">▾</span></div>
      <div class="sec-body"><div class="cg">
        <label class="chip"><input type="checkbox" name="edu" value="00" onchange="ckChg(this,'c-edu','edu')"><span>학력무관</span></label>
        <label class="chip"><input type="checkbox" name="edu" value="01,02" onchange="ckChg(this,'c-edu','edu')"><span>중졸이하</span></label>
        <label class="chip"><input type="checkbox" name="edu" value="03" onchange="ckChg(this,'c-edu','edu')"><span>고졸</span></label>
        <label class="chip"><input type="checkbox" name="edu" value="04" onchange="ckChg(this,'c-edu','edu')"><span>대졸(2~3년)</span></label>
        <label class="chip"><input type="checkbox" name="edu" value="05" onchange="ckChg(this,'c-edu','edu')"><span>대졸(4년)</span></label>
        <label class="chip"><input type="checkbox" name="edu" value="06" onchange="ckChg(this,'c-edu','edu')"><span>석사</span></label>
        <label class="chip"><input type="checkbox" name="edu" value="07" onchange="ckChg(this,'c-edu','edu')"><span>박사</span></label>
      </div></div>
    </div>

    <!-- 임금 -->
    <div class="sec" id="s-pay">
      <div class="sec-hdr" onclick="tog('s-pay')"><span class="sec-lbl">💰 임금</span><span class="sec-ic">▾</span></div>
      <div class="sec-body">
        <div class="fg">
          <div class="sw">
            <select id="paySel" onchange="updUrl()">
              <option value="">임금 무관</option>
              <option value="H">시급</option><option value="D">일급</option>
              <option value="M">월급(만원)</option><option value="Y">연봉(만원)</option>
            </select>
            <span class="sa">▾</span>
          </div>
        </div>
        <div class="fg" style="display:flex;gap:6px">
          <input type="number" id="minPay" placeholder="최소" oninput="updUrl()" style="flex:1;min-width:0;background:var(--sf2);border:1px solid var(--bd2);border-radius:7px;color:var(--tx);padding:7px 10px;font-size:13px;font-family:var(--mono);outline:none">
          <input type="number" id="maxPay" placeholder="최대" oninput="updUrl()" style="flex:1;min-width:0;background:var(--sf2);border:1px solid var(--bd2);border-radius:7px;color:var(--tx);padding:7px 10px;font-size:13px;font-family:var(--mono);outline:none">
        </div>
      </div>
    </div>

    <!-- 근무형태 -->
    <div class="sec" id="s-hol">
      <div class="sec-hdr" onclick="tog('s-hol')"><span class="sec-lbl">📅 근무형태</span><span class="cnt" id="c-hol"></span><span class="sec-ic">▾</span></div>
      <div class="sec-body"><div class="cg">
        <label class="chip"><input type="checkbox" name="hol" value="1" onchange="ckChg(this,'c-hol','hol')"><span>주5일</span></label>
        <label class="chip"><input type="checkbox" name="hol" value="2" onchange="ckChg(this,'c-hol','hol')"><span>주6일</span></label>
        <label class="chip"><input type="checkbox" name="hol" value="4" onchange="ckChg(this,'c-hol','hol')"><span>주4일</span></label>
        <label class="chip"><input type="checkbox" name="hol" value="5" onchange="ckChg(this,'c-hol','hol')"><span>주3일</span></label>
        <label class="chip"><input type="checkbox" name="hol" value="6" onchange="ckChg(this,'c-hol','hol')"><span>주2일</span></label>
        <label class="chip"><input type="checkbox" name="hol" value="7" onchange="ckChg(this,'c-hol','hol')"><span>주1일</span></label>
      </div></div>
    </div>

    <!-- 상용/일용 -->
    <div class="sec" id="s-tp">
      <div class="sec-hdr" onclick="tog('s-tp')"><span class="sec-lbl">🗂 상용/일용</span><span class="cnt" id="c-tp"></span><span class="sec-ic">▾</span></div>
      <div class="sec-body"><div class="cg">
        <label class="chip"><input type="checkbox" name="tp" value="1" onchange="ckChg(this,'c-tp','tp')"><span>상용직</span></label>
        <label class="chip"><input type="checkbox" name="tp" value="2" onchange="ckChg(this,'c-tp','tp')"><span>일용직</span></label>
      </div></div>
    </div>

    <!-- 직종 -->
    <div class="sec" id="s-job">
      <div class="sec-hdr" onclick="tog('s-job')"><span class="sec-lbl">🔧 직종 / 직업</span><span class="cnt" id="c-job"></span><span class="sec-ic">▾</span></div>
      <div class="sec-body"><div class="job-tree" id="jobTree"><div style="color:var(--tx3);font-size:12px;font-family:var(--mono);padding:8px">불러오는 중...</div></div></div>
    </div>

    <!-- 가져올 개수 -->
    <div class="sec" id="s-pg">
      <div class="sec-hdr" onclick="tog('s-pg')"><span class="sec-lbl">📄 가져올 개수</span><span class="sec-ic">▾</span></div>
      <div class="sec-body"><div class="cg">
        <label class="chip on"><input type="radio" name="pgc" value="25" onchange="rdChg(this)" checked><span>25개</span></label>
        <label class="chip"><input type="radio" name="pgc" value="50" onchange="rdChg(this)"><span>50개</span></label>
        <label class="chip"><input type="radio" name="pgc" value="100" onchange="rdChg(this)"><span>100개</span></label>
      </div></div>
    </div>

    <div class="url-box">
      <div class="url-lbl">REQUEST URL</div>
      <div class="url-txt" id="urlTxt">조건을 선택하면 자동 생성됩니다...</div>
    </div>

    <button class="srch-btn" id="srchBtn" onclick="currentPage=1;doSearch()"><span>⚡</span><span>크롤링 시작</span></button>
  </aside>

  <main class="main" id="mainArea">
    <div class="empty" id="emptyState">
      <div class="empty-ic">🕷️</div>
      <div class="empty-ttl">조건을 선택하고 크롤링하세요</div>
      <div class="empty-sub">왼쪽 필터 설정 후 크롤링 버튼을 누르면<br>고용24(워크넷) 채용공고를 수집합니다</div>
    </div>
    <div id="resArea" style="display:none">
      <div class="res-hdr">
        <span class="res-n" id="resN">0</span>
        <span class="res-lbl">건의 채용공고</span>
        <span id="resPageInfo" style="font-size:13px;color:var(--tx3);font-family:var(--mono)"></span>
        <a id="resLink" href="#" target="_blank" class="res-link">↗ 고용24에서 보기</a>
      </div>
      <div class="grid" id="resGrid"></div>
      <div class="pgn" id="pgn" style="display:none"></div>
    </div>
    <div id="errArea" style="display:none">
      <div class="err-box"><span class="err-ic">⚠️</span><div class="err-msg" id="errMsg"></div></div>
    </div>
  </main>
</div>

<div class="ld" id="ld"><div class="spin"></div><div class="ld-txt">크롤링 중...</div></div>

<script>
  const BASE='https://www.work24.go.kr/wk/a/b/1200/retriveDtlEmpSrchList.do';
  let currentPage=1, lastReq=null, allPostings=[];
  let currentJobId=null, currentEventSource=null;

  /* 직종 트리 상태 */
  const catSel=new Set();          // 대분류 전체선택 코드
  const kwSel=new Map();           // 대분류코드 → Set(중분류코드)
  const subLoaded=new Set();       // 하위목록 로드 완료한 대분류
  const catName=new Map();         // 대분류코드 → 이름 (참고용)

  function initTheme(){applyTheme(localStorage.getItem('e24-theme')||'light')}
  function toggleTheme(){const c=document.documentElement.classList.contains('light')?'light':'dark';const n=c==='dark'?'light':'dark';applyTheme(n);localStorage.setItem('e24-theme',n)}
  function applyTheme(t){const h=document.documentElement,b=document.getElementById('themeBtn');if(t==='light'){h.classList.add('light');b.textContent='🌙'}else{h.classList.remove('light');b.textContent='☀️'}}

  function tog(id){document.getElementById(id).classList.toggle('open')}
  function setCnt(id,n){const e=document.getElementById(id);if(!e)return;e.textContent=n;e.classList.toggle('show',n>0)}
  function ckChg(inp,cntId,name){inp.closest('.chip').classList.toggle('on',inp.checked);setCnt(cntId,document.querySelectorAll(`[name="${name}"]:checked`).length);updUrl()}
  function rdChg(inp){document.querySelectorAll(`[name="${inp.name}"]`).forEach(i=>i.closest('.chip').classList.remove('on'));inp.closest('.chip').classList.add('on');updUrl()}
  function onRegion(){setCnt('c-loc',document.getElementById('regSel').value?1:0);updUrl()}

  function vals(name){return [...document.querySelectorAll(`[name="${name}"]:checked`)].map(i=>i.value)}

  /* ── 직종 트리 ─────────────────────────────────────────────────── */
  async function loadJobTree(){
    const tree=document.getElementById('jobTree');
    try{
      const res=await fetch('/jobinfo/employment24/api/jobs');
      const cats=await res.json();
      cats.forEach(c=>catName.set(c.code,c.name));
      tree.innerHTML=cats.map(c=>`
        <div class="jcat" id="jc-${c.code}">
          <div class="jcat-row">
            <label class="jcat-ck" title="${x(c.name)} 전체 선택">
              <input type="checkbox" id="jck-${c.code}" onchange="catAll('${c.code}',this.checked)">
              <div class="ck-box">✓</div>
            </label>
            <div class="jcat-hdr" onclick="togCat('${c.code}')">
              <span class="jcat-tog">▶</span>
              <span>${x(c.name)}</span>
              <span class="jcat-cnt" id="jcnt-${c.code}">0</span>
            </div>
          </div>
          <div class="jkws"><div class="kw-grid" id="jkw-${c.code}"><span style="color:var(--tx3);font-size:11px">펼치면 로드…</span></div></div>
        </div>`).join('');
    }catch(e){ tree.innerHTML='<div style="color:#fca5a5;font-size:12px;padding:8px">직종 목록 로드 실패</div>'; }
  }

  async function togCat(c){
    const el=document.getElementById('jc-'+c);
    el.classList.toggle('open');
    if(el.classList.contains('open') && !subLoaded.has(c)){
      subLoaded.add(c);
      const grid=document.getElementById('jkw-'+c);
      try{
        const res=await fetch('/jobinfo/employment24/api/jobs?superJobsCd='+encodeURIComponent(c));
        const subs=await res.json();
        grid.innerHTML=subs.map(s=>`<span class="kw" data-cat="${c}" data-kc="${s.code}" onclick="togKw('${c}','${s.code}',this)">${x(s.name)}</span>`).join('')||'<span style="color:var(--tx3);font-size:11px">하위 없음</span>';
        // 대분류 전체선택 상태면 자식 칩도 on 표시
        if(catSel.has(c)) grid.querySelectorAll('.kw').forEach(k=>k.classList.add('on'));
      }catch(e){ grid.innerHTML='<span style="color:#fca5a5;font-size:11px">로드 실패</span>'; subLoaded.delete(c); }
    }
  }

  function catAll(cat,checked){
    const lbl=document.querySelector(`#jc-${cat} .jcat-ck`);
    if(checked){ catSel.add(cat); kwSel.delete(cat); }
    else { catSel.delete(cat); }
    document.querySelectorAll(`[data-cat="${cat}"]`).forEach(e=>e.classList.toggle('on',checked));
    lbl.classList.remove('partial');
    syncCat(cat); updJobCnt(); updUrl();
  }

  function togKw(cat,code,el){
    el.classList.toggle('on');
    if(!kwSel.has(cat)) kwSel.set(cat,new Set());
    const s=kwSel.get(cat);
    el.classList.contains('on')?s.add(code):s.delete(code);
    if(s.size===0) kwSel.delete(cat);
    // 개별 중분류 선택 시 대분류 전체선택 해제
    if(catSel.has(cat) && !el.classList.contains('on')){ catSel.delete(cat); document.getElementById('jck-'+cat).checked=false; }
    syncCat(cat); updJobCnt(); updUrl();
  }

  function syncCat(c){
    const s=kwSel.get(c), n=s?s.size:0;
    const ck=document.getElementById('jck-'+c), lbl=ck.closest('.jcat-ck'), cnt=document.getElementById('jcnt-'+c);
    if(catSel.has(c)){ ck.checked=true; lbl.classList.remove('partial'); cnt.textContent='전체'; cnt.classList.add('show'); }
    else if(n>0){ ck.checked=false; lbl.classList.add('partial'); cnt.textContent=n; cnt.classList.add('show'); }
    else { ck.checked=false; lbl.classList.remove('partial'); cnt.classList.remove('show'); }
  }
  function updJobCnt(){ setCnt('c-job', catSel.size+kwSel.size); }

  function occList(){
    // 대분류 전체선택분 + (부모가 전체선택 안 된) 중분류 선택분
    const out=[];
    catSel.forEach(c=>out.push(c));
    kwSel.forEach((set,parent)=>{ if(!catSel.has(parent)) set.forEach(c=>out.push(c)); });
    return out;
  }

  function buildReq(){
    return {
      keyword: document.getElementById('kw').value.trim(),
      region: document.getElementById('regSel').value,
      occupation: occList(),
      careerTypes: vals('car'),
      academicGbn: vals('edu'),
      payGbn: document.getElementById('paySel').value,
      minPay: document.getElementById('minPay').value,
      maxPay: document.getElementById('maxPay').value,
      empTpGbcd: vals('tp'),
      holidayGbn: vals('hol'),
      enterPriseGbn: vals('ent'),
      employGbn: vals('emp'),
      page: currentPage,
      pageCount: parseInt(document.querySelector('[name="pgc"]:checked')?.value||'25')
    };
  }

  function mkUrl(r){
    const p=['pageIndex='+(r.page||1)];
    if(r.keyword) p.push('keyword='+encodeURIComponent(r.keyword));
    if(r.region) p.push('region='+r.region);
    const add=(k,a)=>{const c=(a||[]).filter(Boolean);if(c.length)p.push(k+'='+c.join(','))};
    add('occupation',r.occupation);
    add('careerTypes',r.careerTypes); add('academicGbn',r.academicGbn);
    add('empTpGbcd',r.empTpGbcd); add('holidayGbn',r.holidayGbn);
    add('enterPriseGbn',r.enterPriseGbn); add('employGbn',r.employGbn);
    if(r.payGbn){p.push('payGbn='+r.payGbn);if(r.minPay)p.push('minPay='+r.minPay);if(r.maxPay)p.push('maxPay='+r.maxPay);}
    return BASE+'?'+p.join('&');
  }
  function updUrl(){document.getElementById('urlTxt').textContent=mkUrl(buildReq())}

  function csrf(){const m=document.cookie.match(/(?:^|;\s*)XSRF-TOKEN=([^;]+)/);return m?decodeURIComponent(m[1]):''}
  function jsonHdr(){return {'Content-Type':'application/json','X-XSRF-TOKEN':csrf()}}

  async function doSearch(page){
    if(page!==undefined) currentPage=page; else {currentPage=1; allPostings=[];}
    const btn=document.getElementById('srchBtn'),ld=document.getElementById('ld');
    btn.disabled=true; ld.classList.add('on');
    document.getElementById('resArea').style.display='none';
    document.getElementById('emptyState').style.display='none';
    document.getElementById('errArea').style.display='none';
    const req=buildReq(); lastReq=req;
    try{
      const res=await fetch('/jobinfo/employment24/api/search',{method:'POST',headers:jsonHdr(),body:JSON.stringify(req)});
      const d=await res.json();
      d.success?render(d):showErr(d.errorMessage,d.crawledUrl);
    }catch(e){showErr('요청 실패: '+e.message,'')}
    finally{btn.disabled=false;ld.classList.remove('on')}
  }

  function render(d){
    document.getElementById('resN').textContent=d.totalCount;
    document.getElementById('resLink').href=d.crawledUrl;
    const cp=d.currentPage||1, tp=d.totalPages||1;
    document.getElementById('resPageInfo').textContent=`${cp} / ${tp} 페이지`;
    document.getElementById('resArea').style.display='block';
    if(d.postings&&d.postings.length>0){
      const ex=new Set(allPostings.map(p=>p.link));
      d.postings.forEach(p=>{if(!ex.has(p.link))allPostings.push(p)});
      document.getElementById('xlBtn').classList.add('show');
    }
    const g=document.getElementById('resGrid');
    if(!d.postings||d.postings.length===0){
      g.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:56px;color:var(--tx3)">
        <div style="font-size:38px;margin-bottom:11px">🔍</div>
        <div style="font-size:15px;color:var(--tx2);font-weight:600">검색 결과 0건</div>
        <div style="font-size:13px;margin-top:8px"><a href="${d.crawledUrl}" target="_blank" style="color:var(--bl2)">↗ 고용24 직접 열기</a></div></div>`;
      renderPgn(cp,tp); return;
    }
    g.innerHTML=d.postings.map(p=>`
      <a class="card" href="${x(p.link||'#')}" target="_blank" rel="noopener">
        <div class="c-co">${x(p.company||'회사명 비공개')}</div>
        <div class="c-ttl">${x(p.title||'제목 없음')}</div>
        <div class="c-tags">
          ${p.location?`<span class="c-tag">📍 ${x(p.location)}</span>`:''}
          ${p.career?`<span class="c-tag">💼 ${x(p.career)}</span>`:''}
          ${p.education?`<span class="c-tag">🎓 ${x(p.education)}</span>`:''}
          ${p.employmentType?`<span class="c-tag">${x(p.employmentType)}</span>`:''}
          ${p.salary?`<span class="c-tag gn">💰 ${x(p.salary)}</span>`:''}
        </div>
        <div class="c-ft"><span class="c-dl">${x(p.deadline||'상시채용')}</span><div class="c-arr">→</div></div>
      </a>`).join('');
    renderPgn(cp,tp);
    document.getElementById('mainArea').scrollTo({top:0,behavior:'smooth'});
  }

  function renderPgn(cp,tp){
    const pgn=document.getElementById('pgn');
    if(tp<=1){pgn.style.display='none';return}
    pgn.style.display='flex';
    const delta=2; let lo=Math.max(1,cp-delta),hi=Math.min(tp,cp+delta);
    if(cp-delta<=2){lo=1;hi=Math.min(tp,5)} if(cp+delta>=tp-1){lo=Math.max(1,tp-4);hi=tp}
    let h=`<button class="pgn-btn" onclick="doSearch(${cp-1})" ${cp===1?'disabled':''}>‹</button>`;
    if(lo>1){h+=`<button class="pgn-btn" onclick="doSearch(1)">1</button>`;if(lo>2)h+=`<span class="pgn-ellipsis">…</span>`}
    for(let i=lo;i<=hi;i++)h+=`<button class="pgn-btn${i===cp?' on':''}" onclick="doSearch(${i})">${i}</button>`;
    if(hi<tp){if(hi<tp-1)h+=`<span class="pgn-ellipsis">…</span>`;h+=`<button class="pgn-btn" onclick="doSearch(${tp})">${tp}</button>`}
    h+=`<button class="pgn-btn" onclick="doSearch(${cp+1})" ${cp===tp?'disabled':''}>›</button><span class="pgn-info">${cp}/${tp}p</span>`;
    pgn.innerHTML=h;
  }

  async function exportExcel(){
    if(!lastReq){alert('먼저 검색을 실행해주세요.');return}
    document.getElementById('xlBtn').classList.remove('show');
    document.getElementById('stopBtn').classList.add('show');
    document.getElementById('xlProgress').classList.add('show');
    document.getElementById('xlBarFill').style.width='0%';
    document.getElementById('xlProgressTxt').textContent='시작 중...';
    try{
      const startRes=await fetch('/jobinfo/employment24/api/search-all?maxPages=0',{method:'POST',headers:jsonHdr(),body:JSON.stringify({...lastReq,page:1})});
      const {jobId}=await startRes.json(); currentJobId=jobId;
      await new Promise((resolve,reject)=>{
        const es=new EventSource(`/jobinfo/employment24/api/search-all/progress/${jobId}`); currentEventSource=es;
        es.addEventListener('progress',e=>{const{currentPage,totalPages,collectedCount}=JSON.parse(e.data);const pct=totalPages>0?Math.round(currentPage/totalPages*100):0;document.getElementById('xlBarFill').style.width=pct+'%';document.getElementById('xlProgressTxt').textContent=`${currentPage}/${totalPages}p · ${collectedCount}건`});
        es.addEventListener('done',e=>{es.close();const d=JSON.parse(e.data);if(!d.postings||!d.postings.length){reject(new Error('수집된 공고가 없습니다.'));return}generateExcel(d.postings);resolve()});
        es.addEventListener('cancelled',()=>{es.close();resolve()});
        es.addEventListener('error',e=>{es.close();reject(new Error(e.data||'SSE 오류'))});
        es.onerror=()=>{es.close();reject(new Error('연결 오류'))};
      });
    }catch(e){if(e.message!=='cancelled')alert('엑셀 내보내기 실패: '+e.message)}
    finally{currentJobId=null;currentEventSource=null;document.getElementById('stopBtn').classList.remove('show');document.getElementById('xlProgress').classList.remove('show');document.getElementById('xlBtn').classList.add('show')}
  }
  function cancelExport(){if(!currentJobId)return;fetch(`/jobinfo/employment24/api/search-all/${currentJobId}`,{method:'DELETE',headers:{'X-XSRF-TOKEN':csrf()}});if(currentEventSource)currentEventSource.close()}

  function generateExcel(postings){
    const rows=postings.map((p,i)=>({'번호':i+1,'회사명':p.company||'','공고제목':p.title||'','지역':p.location||'','경력':p.career||'','학력':p.education||'','고용형태':p.employmentType||'','급여':p.salary||'','마감일':p.deadline||'','등록일':p.registeredDate||'','공고링크':p.link||''}));
    const ws=XLSX.utils.json_to_sheet(rows);
    ws['!cols']=[{wch:6},{wch:22},{wch:45},{wch:18},{wch:10},{wch:12},{wch:14},{wch:18},{wch:13},{wch:13},{wch:60}];
    const range=XLSX.utils.decode_range(ws['!ref']);
    for(let c=range.s.c;c<=range.e.c;c++){const a=XLSX.utils.encode_cell({r:0,c});if(ws[a])ws[a].s={font:{bold:true,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'2563EB'}},alignment:{horizontal:'center'}}}
    for(let r=1;r<=range.e.r;r++){const a=XLSX.utils.encode_cell({r,c:10});if(ws[a]&&ws[a].v){ws[a].l={Target:ws[a].v,Tooltip:'공고 바로가기'};ws[a].s={font:{color:{rgb:'2563EB'},underline:true}}}}
    const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'채용공고');
    const n=new Date();const ts=`${n.getFullYear()}${String(n.getMonth()+1).padStart(2,'0')}${String(n.getDate()).padStart(2,'0')}_${String(n.getHours()).padStart(2,'0')}${String(n.getMinutes()).padStart(2,'0')}`;
    XLSX.writeFile(wb,`고용24_채용공고_${ts}.xlsx`);
  }

  function showErr(msg,url){document.getElementById('errMsg').innerHTML=`<strong>크롤링 실패</strong><br>${msg}${url?`<br><br><a href="${url}" target="_blank" style="color:var(--bl2)">↗ 직접 열어보기</a>`:''}`;document.getElementById('errArea').style.display='block'}
  function x(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

  initTheme(); updUrl(); loadJobTree();
</script>
