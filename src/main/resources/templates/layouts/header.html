<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝓦𝓸𝓸𝓻𝓲</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<header class="header" th:block th:fragment="header">

        <style>
            .hrd-link { display:inline-flex; align-items:center; gap:6px; cursor:pointer; padding:6px 12px;
                border-radius:20px; font-size:13px; font-weight:600; margin-right:14px; user-select:none;
                border:1px solid transparent; transition:filter .15s; }
            .hrd-link.hrd-on   { background:rgba(54,211,153,.15);  color:#1f9d6b; border-color:rgba(54,211,153,.4); }
            .hrd-link.hrd-off  { background:rgba(150,150,150,.12); color:#888;    border-color:rgba(150,150,150,.3); }
            .hrd-link.hrd-wait { background:rgba(251,189,35,.15);  color:#b8860b; border-color:rgba(251,189,35,.4); }
            .hrd-link:hover { filter:brightness(1.05); }
        </style>

        <div class="header-left">
            <div class="logo">⛔출입금지🚭</div>
            <nav>
                <ul class="header-menu">
                    <li style="cursor:pointer"><a id="aiBtn" class="dropdown-arrow"><i class="fas fa-robot"></i> AI</a></li>
                    <li><a href="/weather" class="dropdown-arrow"><i class="fas fa-cloud-sun"></i> 일기예보</a></li>
                    <li><a href="/calculator" class="dropdown-arrow"><i class="fas fa-calculator"></i> 계산기</a></li>
                    <li><a href="/formatter" class="dropdown-arrow"><i class="fas fa-exchange-alt"></i> 단위변환기</a></li>
                    <li><a href="/tetris" class="dropdown-arrow"><i class="fas fa-coffee"></i> 휴게실</a></li>
                    <li><a href="/filestorage/list"><i class="fas fa-folder"></i>  파일 스토리지</a></li>
                    <li><a href="/student"><i class="fas fa-folder"></i>  출석률 계산기</a></li>
                    <li><a href="/printform"><i class="fas fa-folder"></i>  출력 폼</a></li>
<!--                    <li><a href="#" class="dropdown-arrow"><i class="fas fa-file-import"></i> 이미지 압축기</a></li>-->
<!--                    <li><a href="#" class="dropdown-arrow"><i class="fas fa-calendar-alt"></i> 캘린더</a></li>-->
                </ul>
            </nav>
        </div>
        <div class="header-right">
            <div id="hrdLink" class="hrd-link hrd-off" title="HRD 세션 연동" onclick="hrdLinkClick()">
                <i class="fas fa-link"></i>
                <span id="hrdLinkText">HRD 미연동</span>
            </div>
            <div class="user-profile image-container">

                <img sec:authorize="isAuthenticated()"
                     th:src="${#authentication.principal.memberProfile}"
                     class="user-avatar"/>
                <div class="user-avatar" sec:authorize="!isAuthenticated()">G</div>

                <div class="user-info">
                    <h4 sec:authorize="isAuthenticated()" sec:authentication="principal.memberName"></h4>
                    <h4 sec:authorize="!isAuthenticated()">Guest</h4>
                </div>
<!--                <i class="fas fa-chevron-down"></i>-->
            </div>
        </div>

        <script>
            function hrdRenderStatus(s) {
                var el = document.getElementById('hrdLink'), t = document.getElementById('hrdLinkText');
                if (!el) return;
                if (s && s.present) { el.className = 'hrd-link hrd-on'; t.textContent = 'HRD 연동됨' + (s.owner ? (' (' + s.owner + ')') : ''); }
                else if (s && s.takeoverOpen) { el.className = 'hrd-link hrd-wait'; t.textContent = '연동 전환중…'; }
                else { el.className = 'hrd-link hrd-off'; t.textContent = 'HRD 미연동'; }
            }
            function hrdFetchStatus() {
                fetch('/coolapi/hrd/session/status').then(function (r) { return r.json(); }).then(hrdRenderStatus).catch(function () {});
            }
            function hrdLinkClick() {
                fetch('/coolapi/hrd/session/status').then(function (r) { return r.json(); }).then(function (s) {
                    if (s && s.present) {
                        if (confirm('이미 ' + (s.owner || '다른 사용자') + ' 님이 연동되어 있습니다.\n기존 연동을 끊고 새로 연동하시겠습니까?')) {
                            fetch('/coolapi/hrd/session/takeover', { method: 'POST' }).then(function () {
                                alert('연동 전환 창이 열렸습니다(90초).\n본인 PC의 하베스터가 곧 연동을 가져갑니다.');
                                setTimeout(hrdFetchStatus, 1000);
                            });
                        }
                    } else {
                        alert('하베스터(start-harvester.bat)가 실행 중이면 곧 자동 연동됩니다.\n미설치 시 tools/hrd-proxy 안내대로 설치하세요.');
                    }
                });
            }
            document.addEventListener('DOMContentLoaded', function () { hrdFetchStatus(); setInterval(hrdFetchStatus, 15000); });
        </script>
    </header>

</body>
</html>
