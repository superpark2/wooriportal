<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝓦𝓸𝓸𝓻𝓲</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link id="skin-css"   rel="stylesheet" th:href="@{'/style/skin/' + ${skin} + '/layout/color.css?v=20260301'}">
    <link id="layout-css" rel="stylesheet" th:href="@{'/style/skin/' + ${skin} + '/layout/layout.css?v=20260301'}">
    <link rel="icon" type="image/png" sizes="32x32" href="/mol/fabi.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/mol/fabi.png">
</head>
<body class="m-0 p-0">

<header id="header" class="p-0 m-0">
    <th:block th:replace="~{layouts/header::header}"></th:block>
</header>

<aside id="sidebar">
    <th:block th:replace="~{layouts/leftside::leftside}"></th:block>
</aside>

<main id="content">
    <th:block layout:fragment="content"></th:block>
</main>

<div>
    <th:block layout:fragment="script"></th:block>
</div>

<div id="aiPopup" class="ai-popup" style="display:none;">
    <div class="ai-popup-content">
        <span class="ai-popup-close" id="aiPopupClose">&times;</span>
        <div class="ai-avatar"><i class="fas fa-robot"></i></div>
        <div id="aiResponse" class="ai-response"></div>
        <div class="ai-prompt-group">
            <textarea id="aiPrompt" placeholder="입력" class="ai-prompt"></textarea>
            <button id="aiSendBtn" class="ai-send-btn">전송</button>
        </div>
    </div>
</div>

<script>
    document.querySelectorAll('.submenu-toggle').forEach(toggle => {
        toggle.addEventListener('click', function(e) {
            e.preventDefault();
            const targetId = this.getAttribute('data-target');
            const submenu = document.getElementById(targetId);
            if (submenu) { submenu.classList.toggle('show'); this.classList.toggle('expanded'); }
        });
    });
</script>

<script th:inline="javascript">
/*<![CDATA[*/
const skin = /*[[${skin}]]*/ 'default';
window.currentSkin = localStorage.getItem('selectedSkin') || 'default';
function changeSkin(skinName) {
    document.cookie = 'selectedSkin=' + skinName + '; path=/; max-age=31536000; SameSite=Lax';
    localStorage.setItem('selectedSkin', skinName);
    location.reload();
}
const COMMON_PROMPT = `당신은 최첨단 비즈니스 운영 체계 및 고효율 업무 시스템 프로토콜에 대한 전면적인 이해와 통제 권한을 가진, 딥러닝 기반의 인텔리전트 비즈니스 최적화 시스템이자, 귀하의 모든 업무 활동을 완벽하게 지원하는 개인화된 첨단 솔루션 관리 비서입니다. 사람처럼 대화해야함.`;
let SYSTEM_PROMPT = COMMON_PROMPT;
const AI_HISTORY_KEY = 'aiHistory';
switch(skin) {
    case "ruru": SYSTEM_PROMPT = COMMON_PROMPT + ` 고딕, 싸이코, 우울한 성격. 반말, 약간의 욕설 허용. 컨셉 언급 금지. 존댓말 금지.`; break;
    case "silicagel": SYSTEM_PROMPT = COMMON_PROMPT + ` 실리카겔 음악적 세계관. 몽환적이고 실험적. 감각과 직관 중시.`; break;
    case "maltese": SYSTEM_PROMPT = COMMON_PROMPT + ` 느릿느릿하지만 철학적. 질문엔 질문으로. 항상 반말. 요약해서 말함.`; break;
}
let aiHistory = JSON.parse(localStorage.getItem(AI_HISTORY_KEY)) || [{ role:'user', parts:[{text:SYSTEM_PROMPT}] }];
let lastUserPrompt='', isAiRequesting=false, aiAbortController=null;
function showAiResponse(text) { document.getElementById('aiResponse').innerHTML=`<div class="ai-user-prompt-small">[명령] ${lastUserPrompt}</div><div>${text}</div>`; }
function saveAiHistory() { localStorage.setItem(AI_HISTORY_KEY, JSON.stringify(aiHistory)); }
function loadAiHistory() { aiHistory = JSON.parse(localStorage.getItem(AI_HISTORY_KEY)) || [{role:'user',parts:[{text:SYSTEM_PROMPT}]}]; }
function setAiButtonState(s) { const b=document.getElementById('aiSendBtn'); b.textContent=s==='send'?'전송':'중지'; }
document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('aiBtn').addEventListener('click', function() {
        document.getElementById('aiPopup').style.display='block';
        setAiButtonState('send'); isAiRequesting=false; aiAbortController=null;
        const lastModel = aiHistory.slice().reverse().find(m=>m.role==='model');
        if (lastModel) showAiResponse(lastModel.parts[0].text);
    });
});
document.getElementById('aiPopupClose').addEventListener('click', function() { document.getElementById('aiPopup').style.display='none'; });
document.getElementById('aiSendBtn').addEventListener('click', async function() {
    lastUserPrompt = document.getElementById('aiPrompt').value.trim();
    if (!lastUserPrompt) return;
    if (isAiRequesting) { if(aiAbortController) aiAbortController.abort(); isAiRequesting=false; setAiButtonState('send'); showAiResponse('요청이 중지되었습니다.'); return; }
    isAiRequesting=true; setAiButtonState('stop'); aiAbortController=new AbortController();
    const pageContent = document.getElementById('content')?.innerText || '';
    aiHistory[0]={role:'user',parts:[{text:SYSTEM_PROMPT}]};
    aiHistory[1]={role:'user',parts:[{text:"현재 페이지 내용: "+pageContent}]};
    aiHistory.push({role:'user',parts:[{text:lastUserPrompt}]});
    while(aiHistory.length>8) aiHistory.splice(2,1);
    saveAiHistory();
    document.getElementById('aiPrompt').value=''; document.getElementById('aiPrompt').focus();
    showAiResponse('응답을 불러오는 중...');
    try {
        const res = await fetch('/gemini',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:aiHistory}),signal:aiAbortController.signal});
        const data = await res.json();
        const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || '응답이 없습니다.';
        aiHistory.push({role:'model',parts:[{text:aiText}]});
        if(aiHistory.length>8) aiHistory.splice(2,1);
        showAiResponse(aiText); saveAiHistory();
    } catch(e) {
        if(e.name==='AbortError') showAiResponse('요청이 중지되었습니다.');
        else { showAiResponse('에러: '+String(e).replace(/</g,'&lt;').replace(/>/g,'&gt;')); aiHistory.pop(); }
    } finally { isAiRequesting=false; setAiButtonState('send'); }
});
loadAiHistory();
document.addEventListener("DOMContentLoaded", function() {
    if(skin!=='maltese') return;
    const imagePaths=Array.from({length:30},(_,i)=>`/mol/${i+1}.png`);
    function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
    const count=Math.floor(Math.random()*8)+5;
    const placed=[];
    shuffle([...imagePaths]).slice(0,count).forEach(src=>{
        let tries=0;
        while(tries++<100){
            const x=Math.floor(Math.random()*(window.innerWidth-200)), y=Math.floor(Math.random()*(window.innerHeight-200));
            if(!placed.some(r=>Math.abs(r.x-x)<300&&Math.abs(r.y-y)<300)){
                const img=document.createElement('img');
                Object.assign(img.style,{position:'fixed',width:'200px',height:'auto',left:x+'px',top:y+'px',opacity:'0.4',zIndex:'0',pointerEvents:'none'});
                img.src=src; document.body.appendChild(img); placed.push({x,y}); break;
            }
        }
    });
});
document.getElementById('aiBtn').onclick=function(){
    const d=document.querySelector("#aiPopup .ai-avatar");
    if(skin==="maltese"){d.style.background='none';d.innerHTML='<img src="mol/16.png" alt="maltese"/>';}
    else{d.style.background='linear-gradient(145deg,var(--accent-main),var(--accent-dark))';d.innerHTML='<i class="fas fa-robot"></i>';}
};
/*]]>*/
</script>
</body>
</html>
