<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝓦𝓸𝓸𝓻𝓲</title>
    <script th:src="@{/js/csrf.js}"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link id="skin-css"   rel="stylesheet" th:href="@{'/style/skin/' + ${skin} + '/layout/color.css'}">
    <link id="layout-css" rel="stylesheet" th:href="@{'/style/skin/' + ${skin} + '/layout/layout.css'}">
    <link rel="icon" type="image/png" sizes="32x32" href="/fabi.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/fabi.png">
    <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <style>
        /* 팝업 내 마크다운 스타일 */
        #aiResponse .ai-response p { margin-bottom: 0.4em; }
        #aiResponse .ai-response p:last-child { margin-bottom: 0; }
        #aiResponse .ai-response ul, #aiResponse .ai-response ol { padding-left: 1.3em; margin: 0.2em 0 0.5em; }
        #aiResponse .ai-response li { margin-bottom: 0.25em; line-height: 1.55; }
        #aiResponse .ai-response code { background: #f0f2f8; padding: 1px 4px; border-radius: 4px; font-size: 12px; font-family: monospace; }
        #aiResponse .ai-response pre { background: #f0f2f8; padding: 8px; border-radius: 6px; overflow-x: auto; margin: 0.3em 0; font-size: 12px; }
        #aiResponse .ai-response pre code { background: none; padding: 0; }
        #aiResponse .ai-response h1, #aiResponse .ai-response h2, #aiResponse .ai-response h3,
        #aiResponse .ai-response h4, #aiResponse .ai-response h5, #aiResponse .ai-response h6 { font-size: 0.95em; font-weight: 700; margin: 0.8em 0 0.2em; }
        #aiResponse .ai-response strong { font-weight: 700; }
        #aiResponse .ai-response em { font-style: italic; }
        #aiResponse .ai-response blockquote { border-left: 3px solid #d0d5e8; padding-left: 8px; color: #6c757d; margin: 0.4em 0; }
        #aiResponse .ai-response a { color: #3d5aad; text-decoration: underline; }
        #aiResponse .ai-response hr { border: none; border-top: 1px solid #e3e6ef; margin: 6px 0; }
    </style>
</head>
<body class="m-0 p-0">

<header id="header" class="p-0 m-0">
    <th:block th:replace="~{layouts/header::header}"></th:block>
</header>

<aside id="sidebar">
    <th:block th:replace="~{layouts/leftside::leftside}"></th:block>
</aside>

<main id="content">
    <th:block layout:fragment="content"></th:block>
</main>

<div>
    <th:block layout:fragment="script"></th:block>
</div>

<div id="aiPopup" class="ai-popup" style="display:none;">
    <div class="ai-popup-content">

        <!-- 오른쪽 상단 버튼 묶음 (absolute) -->
        <div style="position:absolute;top:10px;right:10px;display:flex;align-items:center;gap:5px;z-index:10;">
            <!-- 초기화 버튼 -->
            <button id="aiResetBtn" title="대화 초기화"
                    style="display:flex;align-items:center;gap:4px;background:none;border:1px solid #ddd;border-radius:6px;color:#bbb;font-size:11px;cursor:pointer;padding:3px 8px;line-height:1;transition:all .15s;"
                    onmouseover="this.style.borderColor='#e63946';this.style.color='#e63946';this.style.background='#fff5f5';"
                    onmouseout="this.style.borderColor='#ddd';this.style.color='#bbb';this.style.background='none';">
                <i class="fas fa-trash-alt" style="font-size:10px;"></i>
                <span>초기화</span>
            </button>
            <!-- 닫기 버튼 -->
            <button id="aiPopupClose"
                    style="display:flex;align-items:center;justify-content:center;width:24px;height:24px;background:none;border:1px solid #ddd;border-radius:6px;color:#bbb;font-size:14px;cursor:pointer;padding:0;line-height:1;transition:all .15s;"
                    onmouseover="this.style.borderColor='#999';this.style.color='#555';this.style.background='#f4f5f8';"
                    onmouseout="this.style.borderColor='#ddd';this.style.color='#bbb';this.style.background='none';">&times;</button>
        </div>

        <!-- 아바타 (원래대로 크게 가운데) -->
        <div class="ai-avatar"><i class="fas fa-robot"></i></div>

        <!-- 채팅 응답 영역 -->
        <div id="aiResponse" class="ai-response" style="overflow-y:auto;max-height:calc(100vh - 320px);min-height:80px;"></div>

        <!-- 입력 영역 -->
        <div class="ai-prompt-group" style="flex-direction:column;gap:0;padding:0;">
            <!-- 이미지 미리보기 -->
            <div id="popupImagePreview" style="display:flex;flex-wrap:wrap;gap:6px;padding:4px 2px;"></div>
            <!-- textarea -->
            <textarea id="aiPrompt" placeholder="입력" class="ai-prompt" style="width:100%;box-sizing:border-box;"></textarea>
            <!-- 하단 버튼 바 -->
            <div style="display:flex;align-items:center;gap:6px;padding:4px 2px 0;">
                <button id="aiAttachBtn" title="이미지 첨부"
                        style="display:flex;align-items:center;gap:4px;flex:none;background:none;border:1px solid #ddd;border-radius:6px;color:#aaa;font-size:13px;cursor:pointer;padding:4px 8px;line-height:1;transition:all .15s;"
                        onmouseover="this.style.borderColor='#3d5aad';this.style.color='#3d5aad';this.style.background='#f0f3ff';"
                        onmouseout="this.style.borderColor='#ddd';this.style.color='#aaa';this.style.background='none';">
                    <i class="fas fa-image"></i>
                </button>
                <input type="file" id="aiFileInput" accept="image/*" multiple style="display:none">
                <button id="aiSendBtn" class="ai-send-btn"
                        style="display:flex;align-items:center;gap:5px;flex:1;justify-content:center;">
                    <i class="fas fa-paper-plane" style="font-size:12px;"></i>
                    <span>전송</span>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- AI 이미지 확대 모달 -->
<div id="aiImgModal"
     style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:99999;align-items:center;justify-content:center;cursor:zoom-out;"
     onclick="this.style.display='none';document.body.style.overflow='';">
    <div id="aiImgModalInner"
         style="background:#fff;padding:12px;border-radius:12px;width:90vw;height:90vh;overflow:auto;cursor:default;display:flex;align-items:center;justify-content:center;"
         onclick="event.stopPropagation();">
    </div>
</div>

<script>
    document.querySelectorAll('.submenu-toggle').forEach(toggle => {
        toggle.addEventListener('click', function(e) {
            e.preventDefault();
            const targetId = this.getAttribute('data-target');
            const submenu = document.getElementById(targetId);
            if (submenu) { submenu.classList.toggle('show'); this.classList.toggle('expanded'); }
        });
    });
</script>

<script th:inline="javascript">
    /*<![CDATA[*/
    const skin = /*[[${skin}]]*/ 'default';
    /*]]>*/
</script>

<script th:src="@{/js/skin/skin.js}"></script>
<script th:src="@{/js/skin/maltese/effect.js}"></script>
<script th:src="@{/js/skin/simileland/effect.js}"></script>
<script th:src="@{/js/ai/popup.js}"></script>

</body>
</html>
