<!DOCTYPE html>
<html lang="ko"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout.html}">
<head>
    <meta charset="UTF-8">
    <title>𝓦𝓸𝓸𝓻𝓲 - File Manager</title>
    <link rel="stylesheet" th:href="@{'/style/skin/default/common/filemanager/filemanager.css'}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.12/themes/default/style.min.css">
</head>
<body>
<div layout:fragment="content" class="aiview">

    <style>
        body {display: block}

        /* --- jsTree 스타일 최종 수정 (역할 분리) --- */

        /* 1. 기본 아이콘 및 점선 제거 */
        .jstree-default .jstree-node,
        .jstree-default .jstree-icon {
            background-image: none !important;
        }
        .jstree-default .jstree-themeicon {
            display: none !important; /* 기본 폴더 아이콘 숨기기 */
        }

        /* 2. 트리 아이템 한 줄로 정렬 */
        .jstree-default .jstree-anchor {
            display: flex !important;
            align-items: center !important;
            white-space: nowrap !important;
            height: 24px !important;
            line-height: 24px !important;
        }

        /* 3. 화살표 아이콘(ocl) 영역 스타일 */
        .jstree-default .jstree-ocl {
            width: 18px !important;
            text-align: center !important;
            background: none !important;
        }

        /* 4. 화살표 문자 크기 및 색상 지정 */
        .jstree-default .jstree-ocl::before {
            font-size: 10px !important; /* 화살표 크기 줄이기 */
            color: #888;
            display: inline-block;
            vertical-align: middle;
        }

        /* 5. 상태별 화살표 문자 */
        .jstree-default .jstree-closed > .jstree-ocl::before {
            content: "▶";
        }
        .jstree-default .jstree-open > .jstree-ocl::before {
            content: "▼";
        }
        .jstree-default .jstree-leaf > .jstree-ocl::before {
            content: ""; /* 하위 없으면 화살표 없음 (공간은 유지) */
        }

        /* 6. 폴더명 앞에 이모지 아이콘 추가 */
        .jstree-default .jstree-anchor::before {
            content: "📁";
            font-size: 16px;
            margin-right: 4px;
        }

        /* --- 기존 스타일 유지 --- */

        /* 디스크 사용량 바 스타일 */
        .fm-disk-usage {
            display: flex;
            align-items: center;
            margin-right: 15px;
            font-size: 12px;
            color: #666;
        }
        .fm-disk-bar-container {
            width: 100px;
            height: 10px;
            background-color: #e0e0e0;
            border-radius: 5px;
            margin-right: 8px;
            overflow: hidden;
        }
        .fm-disk-bar {
            height: 100%;
            background-color: #4caf50;
            width: 0%;
            transition: width 0.5s ease-in-out;
        }
        .fm-disk-bar.warning { background-color: #ff9800; }
        .fm-disk-bar.danger { background-color: #f44336; }

        /* 경로 바(Breadcrumb) 스타일 */
        .fm-path-segment {
            cursor: pointer;
            color: #444;
            padding: 2px 5px;
            border-radius: 3px;
            transition: background-color 0.2s;
        }
        .fm-path-segment:hover {
            background-color: #e0e0e0;
            color: #000;
            text-decoration: underline;
        }
        .fm-path-separator {
            color: #999;
            margin: 0 2px;
            font-weight: bold;
        }
        .fm-path-current {
            font-weight: bold;
            color: #000;
            cursor: default;
        }
        .fm-path-current:hover {
            background-color: transparent;
            text-decoration: none;
        }
    </style>

    <div class="filemanager-wrapper">
        <!-- 상단 툴바 -->
        <div class="fm-toolbar">
            <div class="fm-toolbar-left">
                <button class="fm-toolbar-btn" id="btn-back" title="뒤로" disabled>
                    <span class="fm-icon">◀</span>
                </button>
                <button class="fm-toolbar-btn" id="btn-forward" title="앞으로" disabled>
                    <span class="fm-icon">▶</span>
                </button>
                <button class="fm-toolbar-btn" id="btn-up" title="위로">
                    <span class="fm-icon">▲</span>
                </button>
                <div class="fm-toolbar-separator"></div>
                <button class="fm-toolbar-btn" id="btn-refresh" title="새로고침">
                    <span class="fm-icon">🔄</span>
                </button>
                <div class="fm-toolbar-separator"></div>
                <button class="fm-toolbar-btn" id="btn-upload" title="업로드">
                    <span class="fm-icon">📤</span>
                </button>
                <button class="fm-toolbar-btn" id="btn-new-folder" title="새 폴더">
                    <span class="fm-icon">📁</span>
                </button>
                <div class="fm-toolbar-separator"></div>
                <button class="fm-toolbar-btn" id="btn-copy" title="복사" disabled>
                    <span class="fm-icon">📋</span>
                </button>
                <button class="fm-toolbar-btn" id="btn-cut" title="잘라내기" disabled>
                    <span class="fm-icon">✂️</span>
                </button>
                <button class="fm-toolbar-btn" id="btn-paste" title="붙여넣기" disabled>
                    <span class="fm-icon">📌</span>
                </button>
                <div class="fm-toolbar-separator"></div>
                <button class="fm-toolbar-btn" id="btn-rename" title="이름 변경" disabled>
                    <span class="fm-icon">✏️</span>
                </button>
                <button class="fm-toolbar-btn" id="btn-delete" title="삭제" disabled>
                    <span class="fm-icon">🗑️</span>
                </button>
                <button class="fm-toolbar-btn" id="btn-download" title="다운로드" disabled>
                    <span class="fm-icon">⬇️</span>
                </button>
                <div class="fm-toolbar-separator"></div>
                <button class="fm-toolbar-btn active" id="btn-view-list" title="리스트 뷰">
                    <span class="fm-icon">☰</span>
                </button>
                <button class="fm-toolbar-btn" id="btn-view-thumb" title="썸네일 뷰">
                    <span class="fm-icon">⊞</span>
                </button>
            </div>
            <div class="fm-toolbar-right">
                <!-- 디스크 사용량 표시 -->
                <div class="fm-disk-usage" id="fm-disk-usage" title="디스크 사용량">
                    <div class="fm-disk-bar-container">
                        <div class="fm-disk-bar" id="fm-disk-bar"></div>
                    </div>
                    <span id="fm-disk-text">0%</span>
                </div>
                <input type="text" class="fm-search" id="fm-search" placeholder="검색...">
            </div>
        </div>

        <!-- 메인 레이아웃 -->
        <div class="fm-layout">
            <!-- 좌측: 폴더 트리 -->
            <div class="fm-tree-panel">
                <div class="fm-tree-header">폴더</div>
                <div id="fm-tree" class="fm-tree"></div>
                <div class="fm-tree-footer">
                    <div class="fm-stats" id="fm-stats">
                        <div class="stat-item">
                            <span class="stat-label">선택:</span>
                            <span class="stat-value" id="stat-selected">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">총 크기:</span>
                            <span class="stat-value" id="stat-size">0 B</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 중앙: 파일 영역 -->
            <div class="fm-content-panel">
                <div class="fm-path-bar" id="fm-path-bar">/</div>
                <div class="fm-view-container">
                    <!-- 리스트 뷰 -->
                    <div id="fm-list-view" class="fm-view">
                        <table class="fm-table">
                            <thead>
                                <tr>
                                    <th class="col-check"><input type="checkbox" id="check-all"></th>
                                    <th class="col-name">이름</th>
                                    <th class="col-size">크기</th>
                                    <th class="col-date">수정일</th>
                                    <th class="col-type">유형</th>
                                </tr>
                            </thead>
                            <tbody id="fm-list-body"></tbody>
                        </table>
                    </div>
                    <!-- 썸네일 뷰 -->
                    <div id="fm-thumb-view" class="fm-view" style="display: none;">
                        <div class="fm-thumb-grid" id="fm-thumb-grid"></div>
                    </div>
                </div>
            </div>

            <!-- 우측: 상세 정보 -->
            <div class="fm-details-panel">
                <div class="fm-details-header">속성</div>
                <div class="fm-details-content" id="fm-details-content">
                    <div class="fm-no-selection">항목을 선택하세요</div>
                </div>
            </div>
        </div>

        <!-- 컨텍스트 메뉴 -->
        <div id="fm-context-menu" class="fm-context-menu">
            <div class="fm-context-item" data-action="open">열기</div>
            <div class="fm-context-item" data-action="download">다운로드</div>
            <div class="fm-context-separator"></div>
            <div class="fm-context-item" data-action="cut">잘라내기</div>
            <div class="fm-context-item" data-action="copy">복사</div>
            <div class="fm-context-item" data-action="paste" style="display: none;">붙여넣기</div>
            <div class="fm-context-separator"></div>
            <div class="fm-context-item" data-action="rename">이름 변경</div>
            <div class="fm-context-item" data-action="delete">삭제</div>
            <div class="fm-context-separator"></div>
            <div class="fm-context-item" data-action="properties">속성</div>
        </div>

        <input type="file" id="file-input" multiple style="display: none;">

        <!-- 비밀번호 입력 모달 -->
        <div id="password-modal" class="fm-password-modal" style="display: none;">
            <div class="fm-password-modal-content">
                <div class="fm-password-modal-header">
                    <h3>잠금 해제</h3>
                    <button class="fm-password-close" id="password-modal-close">&times;</button>
                </div>
                <div class="fm-password-modal-body">
                    <p>숨김 폴더에 접근하려면 비밀번호를 입력하세요.</p>
                    <input type="password" id="password-input" class="fm-password-input" placeholder="비밀번호 입력" autofocus>
                    <div id="password-error" class="fm-password-error" style="display: none;"></div>
                </div>
                <div class="fm-password-modal-footer">
                    <button class="fm-password-btn" id="password-submit">확인</button>
                    <button class="fm-password-btn fm-password-btn-cancel" id="password-cancel">취소</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div layout:fragment="script">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.12/jstree.min.js"></script>
    
    <script>
        let currentPath = "/";
        let selectedFiles = [];
        let allFiles = [];
        let clipboard = null;
        let clipboardAction = null;
        let currentView = 'list'; // 'list' or 'thumb'
        let history = [];
        let historyIndex = -1;
        let folderTree;
        let tempPassword = null; // 임시 비밀번호 저장 변수

        $(document).ready(function() {
            initFolderTree();
            initEventHandlers();
            initPasswordModal();
            loadFiles(currentPath);
            loadDiskUsage(); // 디스크 사용량 로드
        });

        function initFolderTree() {
            folderTree = $('#fm-tree').jstree({
                'core': {
                    'data': {
                        'url': '/filestorage/api/files/tree',
                        'data': function (node) {
                            return {
                                'path': node.id === '#' ? '/' : node.id,
                                'password': tempPassword
                            };
                        }
                    },
                    'check_callback': true,
                    'themes': {
                        'name': 'default',
                        'dots': false, // 점선 제거
                        'icons': true
                    }
                },
                'plugins': ['dnd'],
                'dnd': { 'is_draggable': () => true },
                'types': {
                    'default': { 
                        'icon': 'jstree-folder',
                        'li_attr': { 'class': 'jstree-folder-custom' }
                    }
                }
            });

            folderTree.on('select_node.jstree', function (e, data) {
                const path = data.node.id === '#' ? '/' : data.node.id;
                navigateTo(path);
            });

            folderTree.on('move_node.jstree', function (e, data) {
                const from = data.node.id === '#' ? '/' : data.node.id;
                const to = data.parent === '#' ? '/' : data.parent;
                moveItem(from, to, true);
            });
        }

        function initEventHandlers() {
            // 툴바 버튼
            $('#btn-back').click(() => historyBack());
            $('#btn-forward').click(() => historyForward());
            $('#btn-up').click(() => {
                if (currentPath !== '/') {
                    const parts = currentPath.split('/').filter(p => p);
                    parts.pop();
                    navigateTo('/' + parts.join('/'));
                }
            });
            $('#btn-refresh').click(() => {
                loadFiles(currentPath);
                if (folderTree) {
                    folderTree.jstree(true).refresh();
                }
                loadDiskUsage(); // 새로고침 시 디스크 사용량도 갱신
            });
            $('#btn-upload').click(() => $('#file-input').click());
            $('#btn-new-folder').click(() => {
                const name = prompt('폴더 이름:');
                if (name) createFolder(name);
            });
            $('#btn-copy').click(() => {
                if (selectedFiles.length > 0) {
                    clipboard = selectedFiles[0];
                    clipboardAction = 'copy';
                    updateToolbar();
                    displayFiles(allFiles); // 복사 시 잘라낸 표시 제거
                }
            });
            $('#btn-cut').click(() => {
                if (selectedFiles.length > 0) {
                    clipboard = selectedFiles[0];
                    clipboardAction = 'cut';
                    updateToolbar();
                    displayFiles(allFiles); // 잘라낸 파일 표시 업데이트
                }
            });
            $('#btn-paste').click(() => {
                if (clipboard) {
                    moveItem(clipboard.id, currentPath, clipboardAction === 'cut');
                }
            });
            $('#btn-rename').click(() => {
                if (selectedFiles.length === 1) {
                    const newName = prompt('새 이름:', selectedFiles[0].name);
                    if (newName) renameItem(selectedFiles[0].id, newName);
                }
            });
            $('#btn-delete').click(() => {
                if (selectedFiles.length > 0 && confirm('삭제하시겠습니까?')) {
                    deleteSelected();
                }
            });
            $('#btn-download').click(() => {
                if (selectedFiles.length > 0) {
                    downloadSelected();
                }
            });
            $('#btn-view-list').click(() => switchView('list'));
            $('#btn-view-thumb').click(() => switchView('thumb'));

            // 파일 입력
            $('#file-input').change(function(e) {
                const files = e.target.files;
                if (files.length > 0) uploadFiles(files);
            });

            // 전체 선택
            $('#check-all').change(function() {
                $('.file-checkbox').prop('checked', $(this).prop('checked'));
                updateSelection();
            });

            // 파일 선택 (리스트 뷰)
            $(document).on('change', '.file-checkbox', updateSelection);
            $(document).on('click', '.fm-file-item', function(e) {
                if ($(e.target).is('input[type="checkbox"]')) return;
                
                const isCtrl = e.ctrlKey || e.metaKey;
                const isShift = e.shiftKey;
                const checkbox = $(this).find('.file-checkbox');
                
                if (isShift && selectedFiles.length > 0) {
                    const $items = $('.fm-file-item');
                    const currentIdx = $items.index($(this));
                    const lastIdx = $items.index($('.fm-file-item:has(.file-checkbox:checked)').last());
                    const start = Math.min(currentIdx, lastIdx);
                    const end = Math.max(currentIdx, lastIdx);
                    $items.slice(start, end + 1).find('.file-checkbox').prop('checked', true);
                } else if (!isCtrl) {
                    $('.file-checkbox').prop('checked', false);
                    checkbox.prop('checked', true);
                } else {
                    checkbox.prop('checked', !checkbox.prop('checked'));
                }
                
                updateSelection();
            });

            // 썸네일 선택
            $(document).on('click', '.fm-thumb-item', function(e) {
                if ($(e.target).is('input[type="checkbox"]')) return;
                
                const isCtrl = e.ctrlKey || e.metaKey;
                const isShift = e.shiftKey;
                const checkbox = $(this).find('.file-checkbox');
                
                if (isShift && selectedFiles.length > 0) {
                    const $items = $('.fm-thumb-item');
                    const currentIdx = $items.index($(this));
                    const lastIdx = $items.index($('.fm-thumb-item:has(.file-checkbox:checked)').last());
                    const start = Math.min(currentIdx, lastIdx);
                    const end = Math.max(currentIdx, lastIdx);
                    $items.slice(start, end + 1).find('.file-checkbox').prop('checked', true);
                } else if (!isCtrl) {
                    $('.file-checkbox').prop('checked', false);
                    checkbox.prop('checked', true);
                } else {
                    checkbox.prop('checked', !checkbox.prop('checked'));
                }
                
                updateSelection();
            });

            // 더블클릭 (리스트 뷰)
            $(document).on('dblclick', '.fm-file-item.folder', function() {
                const file = $(this).data('file');
                navigateTo(file.id);
            });
            $(document).on('dblclick', '.fm-file-item.file', function() {
                const file = $(this).data('file');
                if (['jpg', 'jpeg', 'png', 'gif'].includes(file.ext)) {
                    window.open('/filestorage/api/files/download?path=' + encodeURIComponent(file.id) + '&preview=true', '_blank');
                } else {
                    downloadFile(file.id);
                }
            });

            // 더블클릭 (썸네일 뷰)
            $(document).on('dblclick', '.fm-thumb-item.folder', function() {
                const file = $(this).data('file');
                navigateTo(file.id);
            });
            $(document).on('dblclick', '.fm-thumb-item.file', function() {
                const file = $(this).data('file');
                if (['jpg', 'jpeg', 'png', 'gif'].includes(file.ext)) {
                    window.open('/filestorage/api/files/download?path=' + encodeURIComponent(file.id) + '&preview=true', '_blank');
                } else {
                    downloadFile(file.id);
                }
            });

            // 컨텍스트 메뉴 (리스트 뷰)
            $(document).on('contextmenu', '.fm-file-item', function(e) {
                e.preventDefault();
                const file = $(this).data('file');
                if (!selectedFiles.find(f => f.id === file.id)) {
                    $('.file-checkbox').prop('checked', false);
                    $(this).find('.file-checkbox').prop('checked', true);
                    updateSelection();
                }
                showContextMenu(e.pageX, e.pageY);
            });

            // 컨텍스트 메뉴 (썸네일 뷰)
            $(document).on('contextmenu', '.fm-thumb-item', function(e) {
                e.preventDefault();
                const file = $(this).data('file');
                if (!selectedFiles.find(f => f.id === file.id)) {
                    $('.file-checkbox').prop('checked', false);
                    $(this).find('.file-checkbox').prop('checked', true);
                    updateSelection();
                }
                showContextMenu(e.pageX, e.pageY);
            });
            $(document).on('click', function(e) {
                if (!$(e.target).closest('#fm-context-menu').length) {
                    $('#fm-context-menu').hide();
                }
            });
            $(document).on('click', '.fm-context-item', function() {
                const action = $(this).data('action');
                handleContextAction(action);
                $('#fm-context-menu').hide();
            });

            // 검색
            $('#fm-search').on('keyup', function() {
                const query = $(this).val().toLowerCase();
                filterFiles(query);
            });

            // 키보드 단축키: 위로셋 아래로셋 위로일곱 (FileStorage와 동일)
            (function() {
                const sequence = [
                    'ArrowUp','ArrowUp','ArrowUp',
                    'ArrowDown','ArrowDown','ArrowDown',
                    'ArrowUp','ArrowUp','ArrowUp','ArrowUp','ArrowUp','ArrowUp','ArrowUp'
                ];
                let buffer = [];

                $(document).on('keydown', function(e) {
                    const key = e.key;
                    buffer.push(key);
                    if (buffer.length > sequence.length) buffer.shift();
                    if (JSON.stringify(buffer) === JSON.stringify(sequence)) {
                        buffer = [];
                        showPasswordModal();
                    }
                });
            })();

            // 드래그 앤 드롭 (항상 가능하되, 클릭/더블클릭은 그대로 유지)
            let draggedFile = null;
            let draggedElement = null;

            $(document).on('dragstart', '.fm-file-item, .fm-thumb-item', function(e) {
                draggedElement = $(this);
                const file = $(this).data('file');
                if (file) {
                    draggedFile = file;
                    $(this).addClass('fm-dragging');
                    e.originalEvent.dataTransfer.effectAllowed = 'move';
                    e.originalEvent.dataTransfer.setData('text/plain', file.id);
                }
            });

            $(document).on('dragend', '.fm-file-item, .fm-thumb-item', function() {
                $(this).removeClass('fm-dragging');
                $('.fm-drop-target').removeClass('fm-drop-target');
                draggedFile = null;
                draggedElement = null;
            });

            $(document).on('dragover', '.fm-file-item.folder, .fm-thumb-item.folder', function(e) {
                e.preventDefault();
                e.stopPropagation();
                const targetFile = $(this).data('file');
                if (draggedFile && targetFile && draggedFile.id !== targetFile.id) {
                    $(this).addClass('fm-drop-target');
                    e.originalEvent.dataTransfer.dropEffect = 'move';
                }
            });

            $('#fm-tree').on('dragover', '.jstree-node', function(e) {
                e.preventDefault();
                e.stopPropagation();
                if (draggedFile) {
                    $(this).addClass('fm-drop-target');
                    e.originalEvent.dataTransfer.dropEffect = 'move';
                }
            });

            $(document).on('dragleave', '.fm-file-item, .fm-thumb-item', function() {
                $(this).removeClass('fm-drop-target');
            });

            $('#fm-tree').on('dragleave', '.jstree-node', function() {
                $(this).removeClass('fm-drop-target');
            });

            $(document).on('drop', '.fm-file-item.folder, .fm-thumb-item.folder', function(e) {
                e.preventDefault();
                e.stopPropagation();
                $(this).removeClass('fm-drop-target');
                
                if (draggedFile) {
                    const targetFile = $(this).data('file');
                    if (targetFile && targetFile.type === 'folder' && draggedFile.id !== targetFile.id) {
                        moveItem(draggedFile.id, targetFile.id, false);
                    }
                }
            });

            // 트리 노드에 드롭
            $('#fm-tree').on('drop', '.jstree-node', function(e) {
                e.preventDefault();
                e.stopPropagation();
                $(this).removeClass('fm-drop-target');
                
                if (draggedFile) {
                    const $node = $(this);
                    const nodeId = folderTree.jstree('get_node', $node).id;
                    const targetPath = nodeId === '#' ? '/' : nodeId;
                    if (draggedFile.id !== targetPath) {
                        moveItem(draggedFile.id, targetPath, false);
                    }
                }
            });

            // 파일 영역에 드롭 (현재 폴더로 이동)
            $(document).on('dragover', '.fm-view-container', function(e) {
                e.preventDefault();
                e.stopPropagation();
                if (draggedFile && draggedFile.id !== currentPath) {
                    $(this).addClass('fm-drop-target');
                    e.originalEvent.dataTransfer.dropEffect = 'move';
                }
            });

            $(document).on('dragleave', '.fm-view-container', function() {
                $(this).removeClass('fm-drop-target');
            });

            $(document).on('drop', '.fm-view-container', function(e) {
                e.preventDefault();
                e.stopPropagation();
                $(this).removeClass('fm-drop-target');
                
                if (draggedFile && draggedFile.id !== currentPath) {
                    moveItem(draggedFile.id, currentPath, false);
                }
            });
        }

        function loadFiles(path) {
            $.ajax({
                url: '/filestorage/api/files',
                method: 'GET',
                data: { path: path, password: tempPassword },
                success: function(files) {
                    allFiles = files;
                    displayFiles(files);
                    currentPath = path;
                    updatePathBar(path);
                    addToHistory(path);
                    selectedFiles = [];
                    updateSelection();
                },
                error: function(xhr) {
                    alert('파일 목록을 불러오는데 실패했습니다.');
                    console.error(xhr);
                }
            });
        }

        function displayFiles(files) {
            if (currentView === 'list') {
                displayListView(files);
            } else {
                displayThumbView(files);
            }
        }

        function displayListView(files) {
            const $tbody = $('#fm-list-body');
            $tbody.empty();

            if (files.length === 0) {
                $tbody.html('<tr><td colspan="5" class="fm-empty">폴더가 비어있습니다.</td></tr>');
                return;
            }

            files.sort((a, b) => {
                if (a.type === 'folder' && b.type !== 'folder') return -1;
                if (a.type !== 'folder' && b.type === 'folder') return 1;
                return a.name.localeCompare(b.name);
            });

            files.forEach(function(file) {
                const icon = file.type === 'folder' ? '📁' : getFileIcon(file.ext);
                const size = file.type === 'folder' ? '' : formatSize(file.size);
                const type = file.type === 'folder' ? '폴더' : (file.ext ? file.ext.toUpperCase() : '파일');
                const isCut = clipboard && clipboard.id === file.id && clipboardAction === 'cut';
                const cutClass = isCut ? 'fm-cut-item' : '';
                
                const $row = $('<tr class="fm-file-item ' + file.type + ' ' + cutClass + '" draggable="true" data-file=\'' + JSON.stringify(file).replace(/'/g, "&#39;") + '\'>');
                $row.html(
                    '<td class="col-check"><input type="checkbox" class="file-checkbox"></td>' +
                    '<td class="col-name"><span class="fm-file-icon">' + icon + '</span> ' + 
                    (isCut ? '<span class="fm-cut-indicator">✂️</span> ' : '') + 
                    file.name + '</td>' +
                    '<td class="col-size">' + size + '</td>' +
                    '<td class="col-date">' + formatDate(file.date) + '</td>' +
                    '<td class="col-type">' + type + '</td>'
                );
                $tbody.append($row);
            });
        }

        function displayThumbView(files) {
            const $grid = $('#fm-thumb-grid');
            $grid.empty();

            if (files.length === 0) {
                $grid.html('<div class="fm-empty">폴더가 비어있습니다.</div>');
                return;
            }

            files.sort((a, b) => {
                if (a.type === 'folder' && b.type !== 'folder') return -1;
                if (a.type !== 'folder' && b.type === 'folder') return 1;
                return a.name.localeCompare(b.name);
            });

            files.forEach(function(file) {
                const icon = file.type === 'folder' ? '📁' : getFileIcon(file.ext);
                const size = file.type === 'folder' ? '' : formatSize(file.size);
                const isImage = ['jpg', 'jpeg', 'png', 'gif'].includes(file.ext);
                const isCut = clipboard && clipboard.id === file.id && clipboardAction === 'cut';
                const cutClass = isCut ? 'fm-cut-item' : '';
                
                const $item = $('<div class="fm-thumb-item ' + file.type + ' ' + cutClass + '" draggable="true" data-file=\'' + JSON.stringify(file).replace(/'/g, "&#39;") + '\'>');
                
                let thumbHtml = '<div class="fm-thumb-check"><input type="checkbox" class="file-checkbox"></div>';
                if (isImage) {
                    thumbHtml += '<div class="fm-thumb-image"><img src="/filestorage/api/files/download?path=' + encodeURIComponent(file.id) + '&preview=true" alt="' + file.name + '"></div>';
                } else {
                    thumbHtml += '<div class="fm-thumb-icon">' + icon + '</div>';
                }
                thumbHtml += '<div class="fm-thumb-name">' + 
                    (isCut ? '<span class="fm-cut-indicator">✂️</span> ' : '') + 
                    file.name + '</div>';
                if (file.type === 'file') {
                    thumbHtml += '<div class="fm-thumb-size">' + size + '</div>';
                }
                
                $item.html(thumbHtml);
                $grid.append($item);
            });
        }

        function switchView(view) {
            currentView = view;
            $('#btn-view-list, #btn-view-thumb').removeClass('active');
            $('#btn-view-' + view).addClass('active');
            $('#fm-list-view, #fm-thumb-view').hide();
            $('#fm-' + view + '-view').show();
            displayFiles(allFiles);
        }

        function updateSelection() {
            selectedFiles = [];
            $('.file-checkbox:checked').each(function() {
                const $item = $(this).closest('.fm-file-item, .fm-thumb-item');
                const file = $item.data('file');
                if (file) selectedFiles.push(file);
            });
            
            $('#check-all').prop('checked', allFiles.length > 0 && selectedFiles.length === allFiles.length);
            updateStats();
            updateDetails();
            updateToolbar();
        }

        function updateStats() {
            $('#stat-selected').text(selectedFiles.length);
            let totalSize = 0;
            selectedFiles.forEach(f => {
                if (f.type === 'file') totalSize += f.size;
            });
            $('#stat-size').text(formatSize(totalSize));
        }

        function updateDetails() {
            const $content = $('#fm-details-content');
            
            if (selectedFiles.length === 0) {
                $content.html('<div class="fm-no-selection">항목을 선택하세요</div>');
                return;
            }

            if (selectedFiles.length === 1) {
                const file = selectedFiles[0];
                const isImage = ['jpg', 'jpeg', 'png', 'gif'].includes(file.ext);
                const previewHtml = isImage ? 
                    '<div class="fm-preview"><img src="/filestorage/api/files/download?path=' + encodeURIComponent(file.id) + '&preview=true" alt="' + file.name + '"></div>' :
                    '<div class="fm-preview-icon">' + (file.type === 'folder' ? '📁' : getFileIcon(file.ext)) + '</div>';
                
                $content.html(
                    previewHtml +
                    '<div class="fm-detail-list">' +
                        '<div class="fm-detail-row"><span class="fm-detail-label">이름:</span><span class="fm-detail-value">' + file.name + '</span></div>' +
                        '<div class="fm-detail-row"><span class="fm-detail-label">유형:</span><span class="fm-detail-value">' + (file.type === 'folder' ? '폴더' : (file.ext ? file.ext.toUpperCase() + ' 파일' : '파일')) + '</span></div>' +
                        (file.type === 'file' ? '<div class="fm-detail-row"><span class="fm-detail-label">크기:</span><span class="fm-detail-value">' + formatSize(file.size) + '</span></div>' : '') +
                        '<div class="fm-detail-row"><span class="fm-detail-label">수정일:</span><span class="fm-detail-value">' + formatDate(file.date) + '</span></div>' +
                        '<div class="fm-detail-row"><span class="fm-detail-label">경로:</span><span class="fm-detail-value fm-path">' + file.id + '</span></div>' +
                    '</div>'
                );
            } else {
                let totalSize = 0;
                selectedFiles.forEach(f => {
                    if (f.type === 'file') totalSize += f.size;
                });
                
                $content.html(
                    '<div class="fm-preview-icon">📄</div>' +
                    '<div class="fm-detail-list">' +
                        '<div class="fm-detail-row"><span class="fm-detail-label">선택된 항목:</span><span class="fm-detail-value">' + selectedFiles.length + '개</span></div>' +
                        '<div class="fm-detail-row"><span class="fm-detail-label">총 크기:</span><span class="fm-detail-value">' + formatSize(totalSize) + '</span></div>' +
                    '</div>'
                );
            }
        }

        function updateToolbar() {
            $('#btn-paste').prop('disabled', !clipboard);
            $('#btn-copy, #btn-cut, #btn-rename, #btn-delete, #btn-download').prop('disabled', selectedFiles.length === 0);
        }

        function updatePathBar(path) {
            const $pathBar = $('#fm-path-bar');
            $pathBar.empty();

            // Root (Home)
            const $root = $('<span class="fm-path-segment" data-path="/">Home</span>');
            $root.click(() => navigateTo('/'));
            $pathBar.append($root);

            if (path === '/' || !path) return;

            const parts = path.split('/').filter(p => p);
            let currentBuild = '';

            parts.forEach((part, index) => {
                currentBuild += '/' + part;
                $pathBar.append('<span class="fm-path-separator">/</span>');

                const targetPath = currentBuild;
                const isLast = index === parts.length - 1;

                const $part = $('<span class="fm-path-segment ' + (isLast ? 'fm-path-current' : '') + '">' + part + '</span>');
                if (!isLast) {
                    $part.click(() => navigateTo(targetPath));
                }
                $pathBar.append($part);
            });
        }

        function navigateTo(path) {
            loadFiles(path);
        }

        function addToHistory(path) {
            if (history[historyIndex] !== path) {
                history = history.slice(0, historyIndex + 1);
                history.push(path);
                historyIndex = history.length - 1;
            }
            $('#btn-back').prop('disabled', historyIndex <= 0);
            $('#btn-forward').prop('disabled', historyIndex >= history.length - 1);
        }

        function historyBack() {
            if (historyIndex > 0) {
                historyIndex--;
                loadFiles(history[historyIndex]);
            }
        }

        function historyForward() {
            if (historyIndex < history.length - 1) {
                historyIndex++;
                loadFiles(history[historyIndex]);
            }
        }

        function getFileIcon(ext) {
            const icons = {
                'jpg': '🖼️', 'jpeg': '🖼️', 'png': '🖼️', 'gif': '🖼️',
                'pdf': '📕', 'doc': '📄', 'docx': '📄',
                'xls': '📊', 'xlsx': '📊', 'mp4': '🎬', 'avi': '🎬',
                'mp3': '🎵', 'wav': '🎵', 'zip': '📦', 'rar': '📦'
            };
            return icons[ext] || '📄';
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        function formatDate(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleDateString('ko-KR') + ' ' + date.toLocaleTimeString('ko-KR', {hour: '2-digit', minute: '2-digit'});
        }

        function filterFiles(query) {
            if (!query) {
                displayFiles(allFiles);
                return;
            }
            const filtered = allFiles.filter(f => f.name.toLowerCase().includes(query));
            displayFiles(filtered);
        }

        function uploadFiles(files) {
            const formData = new FormData();
            for (let i = 0; i < files.length; i++) {
                formData.append('file', files[i]);
            }
            formData.append('path', currentPath);
            
            $.ajax({
                url: '/filestorage/api/files/upload',
                method: 'POST',
                data: formData,
                processData: false,
                contentType: false,
                success: function() {
                    alert('업로드 완료 (' + files.length + '개 파일)');
                    loadFiles(currentPath);
                    $('#file-input').val('');
                    loadDiskUsage(); // 업로드 후 디스크 사용량 갱신
                },
                error: function(xhr) {
                    alert('업로드 실패: ' + (xhr.responseJSON?.message || xhr.statusText));
                }
            });
        }

        function createFolder(name) {
            $.ajax({
                url: '/filestorage/api/files',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ path: currentPath, name: name, type: 'folder' }),
                success: function() {
                    loadFiles(currentPath);
                    folderTree.jstree('refresh');
                },
                error: function(xhr) {
                    alert('폴더 생성 실패: ' + (xhr.responseJSON?.message || xhr.statusText));
                }
            });
        }

        function deleteSelected() {
            const promises = selectedFiles.map(file => {
                return $.ajax({
                    url: '/filestorage/api/files',
                    method: 'DELETE',
                    data: { path: file.id }
                });
            });

            Promise.all(promises).then(() => {
                alert('삭제 완료');
                loadFiles(currentPath);
                folderTree.jstree('refresh');
                loadDiskUsage(); // 삭제 후 디스크 사용량 갱신
            }).catch(function(xhr) {
                alert('삭제 실패: ' + (xhr.responseJSON?.message || xhr.statusText));
            });
        }

        function renameItem(path, newName) {
            $.ajax({
                url: '/filestorage/api/files',
                method: 'PUT',
                contentType: 'application/json',
                data: JSON.stringify({ action: 'rename', path: path, newName: newName }),
                success: function() {
                    loadFiles(currentPath);
                    folderTree.jstree('refresh');
                },
                error: function(xhr) {
                    alert('이름 변경 실패: ' + (xhr.responseJSON?.message || xhr.statusText));
                }
            });
        }

        function downloadFile(path) {
            window.location.href = '/filestorage/api/files/download?path=' + encodeURIComponent(path);
        }

        function downloadSelected() {
            const filePaths = selectedFiles.filter(f => f.type === 'file').map(f => f.id);
            if (filePaths.length === 0) {
                alert('다운로드할 파일을 선택하세요.');
                return;
            }
            
            if (filePaths.length === 1) {
                downloadFile(filePaths[0]);
            } else {
                downloadMultipleFiles(filePaths);
            }
        }

        function downloadMultipleFiles(paths) {
            $.ajax({
                url: '/filestorage/api/files/download-multiple',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ paths: paths }),
                xhrFields: {
                    responseType: 'blob'
                },
                success: function(blob) {
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'files_' + Date.now() + '.zip';
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);
                },
                error: function(xhr) {
                    alert('다운로드 실패: ' + (xhr.responseJSON?.message || xhr.statusText));
                }
            });
        }

        function moveItem(sourcePath, targetPath, isCut) {
            $.ajax({
                url: '/filestorage/api/files',
                method: 'PUT',
                contentType: 'application/json',
                data: JSON.stringify({ action: 'move', source: sourcePath, target: targetPath }),
                success: function() {
                    if (isCut || (clipboard && clipboard.id === sourcePath && clipboardAction === 'cut')) {
                        clipboard = null;
                        clipboardAction = null;
                    }
                    loadFiles(currentPath);
                    folderTree.jstree('refresh');
                    updateToolbar();
                },
                error: function(xhr) {
                    const msg = xhr.responseJSON?.message || xhr.statusText;
                    if (msg && msg.includes('Destination already exists')) return;
                    alert('실패: ' + msg);
                }
            });
        }

        function showContextMenu(x, y) {
            const $menu = $('#fm-context-menu');
            $menu.find('[data-action="paste"]').toggle(clipboard !== null).show();
            $menu.css({ left: x + 'px', top: y + 'px', display: 'block' });
        }

        function handleContextAction(action) {
            switch(action) {
                case 'open':
                    if (selectedFiles.length === 1) {
                        const file = selectedFiles[0];
                        if (file.type === 'folder') {
                            navigateTo(file.id);
                        } else {
                            downloadFile(file.id);
                        }
                    }
                    break;
                case 'download':
                    downloadSelected();
                    break;
                case 'cut':
                    if (selectedFiles.length > 0) {
                        clipboard = selectedFiles[0];
                        clipboardAction = 'cut';
                        updateToolbar();
                    }
                    break;
                case 'copy':
                    if (selectedFiles.length > 0) {
                        clipboard = selectedFiles[0];
                        clipboardAction = 'copy';
                        updateToolbar();
                    }
                    break;
                case 'paste':
                    if (clipboard) {
                        moveItem(clipboard.id, currentPath, clipboardAction === 'cut');
                        clipboard = null;
                        clipboardAction = null;
                        updateToolbar();
                    }
                    break;
                case 'rename':
                    if (selectedFiles.length === 1) {
                        const newName = prompt('새 이름:', selectedFiles[0].name);
                        if (newName) renameItem(selectedFiles[0].id, newName);
                    }
                    break;
                case 'delete':
                    if (confirm('삭제하시겠습니까?')) {
                        deleteSelected();
                    }
                    break;
                case 'properties':
                    updateDetails();
                    break;
            }
        }

        function initPasswordModal() {
            $('#password-modal-close, #password-cancel').click(function() {
                hidePasswordModal();
            });

            $('#password-submit').click(function() {
                verifyPassword();
            });

            $('#password-input').on('keypress', function(e) {
                if (e.which === 13) { // Enter 키
                    verifyPassword();
                }
            });

            // 모달 외부 클릭 시 닫기
            $('#password-modal').click(function(e) {
                if ($(e.target).is('#password-modal')) {
                    hidePasswordModal();
                }
            });
        }

        function showPasswordModal() {
            $('#password-modal').fadeIn(200);
            $('#password-input').focus();
            $('#password-error').hide();
            $('#password-input').val('');
        }

        function hidePasswordModal() {
            $('#password-modal').fadeOut(200);
            $('#password-input').val('');
            $('#password-error').hide();
        }

        function verifyPassword() {
            const password = $('#password-input').val();
            
            if (!password) {
                $('#password-error').text('비밀번호를 입력하세요.').show();
                return;
            }

            $.ajax({
                url: '/filestorage/api/lock/verify',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ password: password }),
                success: function(response) {
                    if (response.success) {
                        tempPassword = password; // 임시 변수에 비밀번호 저장
                        hidePasswordModal();
                        alert('잠금이 해제되었습니다.');

                        // 파일 목록과 트리 새로고침
                        loadFiles(currentPath);
                        if (folderTree) {
                            folderTree.jstree(true).destroy();
                        }
                        initFolderTree();

                    } else {
                        $('#password-error').text('비밀번호가 일치하지 않습니다.').show();
                        $('#password-input').val('').focus();
                    }
                },
                error: function(xhr) {
                    const errorMsg = xhr.responseJSON?.message || '비밀번호 검증에 실패했습니다.';
                    $('#password-error').text(errorMsg).show();
                    $('#password-input').val('').focus();
                }
            });
        }

        function loadDiskUsage() {
            $.ajax({
                url: '/filestorage/api/disk/usage',
                method: 'GET',
                success: function(data) {
                    const percent = data.percent;
                    const used = formatSize(data.used);
                    const total = formatSize(data.total);

                    $('#fm-disk-bar').css('width', percent + '%');
                    $('#fm-disk-text').text(percent + '% (' + used + ' / ' + total + ')');

                    // 색상 변경
                    $('#fm-disk-bar').removeClass('warning danger');
                    if (percent >= 90) {
                        $('#fm-disk-bar').addClass('danger');
                    } else if (percent >= 70) {
                        $('#fm-disk-bar').addClass('warning');
                    }
                },
                error: function() {
                    console.error('디스크 사용량 조회 실패');
                }
            });
        }
    </script>
</div>
</body>
</html>
