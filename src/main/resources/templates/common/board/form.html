
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout.html}">
<head>
  <meta charset="UTF-8">
  <title>𝓦𝓸𝓸𝓻𝓲</title>
  <!-- SunEditor JS: CDN 우선 (로컬 파일 0byte 이슈) -->
  <script src="https://cdn.jsdelivr.net/npm/suneditor@2.47.8/dist/suneditor.min.js"
          onerror="this.onerror=null;document.write('<scr'+'ipt src=/js/suneditor-2.47.8/suneditor.min.js><\/scr'+'ipt>')"></script>
  <script src="https://cdn.jsdelivr.net/npm/suneditor@2.47.8/src/lang/ko.js"
          onerror="this.onerror=null;document.write('<scr'+'ipt src=/js/suneditor-2.47.8/ko.js><\/scr'+'ipt>')"></script>
  <!-- SunEditor CSS: CDN 우선, 로컬 폴백 -->
  <link id="se-css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/suneditor@2.47.8/dist/css/suneditor.min.css"
        onerror="this.href='/js/suneditor-2.47.8/css/suneditor.min.css'">
  <link rel="stylesheet" href="/style/fileupload.css">
</head>
<body>
<div layout:fragment="content">

  <link rel="stylesheet" th:href="@{'/style/skin/default/common/board/form.css'}">

  <div class="form-container">
    <h1 th:text="${title} + ' ' + ${subTitle}" class="form-title">타이틀</h1>
    <form th:action="@{/{group}/{category}/write (group=${group}, category=${category})}" id="boardForm" method="post" enctype="multipart/form-data">

      <div class="form-group">
        <label>제목</label>
        <input type="text" name="boardTitle" class="form-input" required maxlength="200"
               placeholder="제목을 입력하세요" th:value="${board.boardTitle}">
      </div>

      <div class="form-group">
        <section class="editor-section">
          <label>내용</label>
          <textarea id="editor-content" name="boardContent"
                    placeholder="내용을 입력하세요..." th:text="${board.boardContent}"></textarea>
        </section>
      </div>

      <div class="form-group">
        <label>첨부파일</label>
        <div class="demo-panel">
          <div class="panel-header">
            <div class="panel-title">첨부파일</div>
            <div class="panel-sub">이미지, PDF, 문서 등 최대 20개까지 첨부 가능합니다.</div>
          </div>
          <div class="panel-body">
            <div class="dropzone" id="dropzone">
              <input type="file" id="fileInput" multiple accept="*/*">
              <div class="dropzone-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                  <polyline points="17 8 12 3 7 8"/>
                  <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
              </div>
              <div class="dropzone-label">파일을 드래그하거나 <span>클릭하여 선택</span></div>
              <div class="dropzone-hint">이미지 · PDF · 문서 · 영상 등 모든 형식 허용</div>
            </div>
            <button class="add-more-btn" id="addMoreBtn" type="button">
              <svg viewBox="0 0 24 24" fill="none"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              첨부파일 추가
            </button>
            <div class="file-counter">
              <span>첨부된 파일</span>
              <span class="count-badge" id="countBadge">0 / 20</span>
            </div>
            <div class="file-list" id="fileList">
              <div class="empty-list" id="emptyMsg">첨부된 파일이 없습니다.</div>
            </div>
          </div>
        </div>
      </div>

      <input type="checkbox" value="true" name="isNotice">
      <label>공지로 등록</label>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">등록</button>
        <a th:href="@{/${type}/${category}/list}" class="btn btn-secondary">취소</a>
      </div>
      <input hidden th:value="${board.boardNum}" name="boardNum">
    </form>
  </div>
</div>


<div layout:fragment="script">

  <script th:inline="javascript">

    const group    = /*[[${group}]]*/ '';
    const category = /*[[${category}]]*/ '';

    const existingFilesRaw = /*[[${board.filesMeta}]]*/ [];
    const initialFiles = (existingFilesRaw || []).map(f => ({ name: f.fileName, path: f.filePath }));

    document.addEventListener("DOMContentLoaded", function () {

      const editor = SUNEDITOR.create('editor-content', {
        width: '100%',
        lang: SUNEDITOR_LANG['ko'],
        height: '400px',
        buttonList: [
          ['undo', 'redo',
            'bold', 'italic', 'underline', 'strike',
            'blockquote', 'indent', 'outdent',
            'image', 'video', 'link',
            'fontColor', 'hiliteColor',
            'align', 'list',
            'fontSize', 'formatBlock',
            'fullScreen', 'preview', 'codeView']
        ],
        imageUploadUrl: `/${group}/${category}/image/upload`,
        imageUploadSizeLimit: 20 * 1024 * 1024,
        imageAccept: '.jpg,.jpeg,.png,.gif,.bmp,.webp,.ico,.tiff,.tif,.svg',
        imageResizing: true,
        imageRotation: false,
      });

      // ════════════════════════════════════════════════════════════════
      //  SunEditor 2.47.8 버그 패치 모음 (라이브러리 파일 무수정)
      // ════════════════════════════════════════════════════════════════

      // ── 패치 1: copyTagAttributes(origin, undefined) → cssText crash ──
      // onKeyDown_wysiwyg 에서 두 번째 인자가 undefined 로 들어올 때 발생.
      const _origCopy = editor.core.util.copyTagAttributes.bind(editor.core.util);
      editor.core.util.copyTagAttributes = function(origin, copyTag, notCopyAttr) {
        if (!origin || !copyTag) return;
        return _origCopy(origin, copyTag, notCopyAttr);
      };

      // ── 패치 2: appendFormatTag 에서 createElement('#text') crash ──
      // getFormatElement 가 텍스트 노드를 반환할 때 nodeName = '#text' 가
      // createElement 에 전달되어 InvalidCharacterError 발생.
      const _origAppend = editor.core.appendFormatTag.bind(editor.core);
      editor.core.appendFormatTag = function(element, formatEl) {
        // formatEl 이 tagName 없는 텍스트 노드면 null 로 교체 → defaultTag 사용
        if (formatEl && !formatEl.tagName) formatEl = null;
        return _origAppend(element, formatEl);
      };

      // ── 패치 3: 이미지 바깥 클릭 시 이미지 선택되는 문제 ──────────────
      // 원인: .se-component 가 display:flex 로 에디터 전체 너비를 차지.
      //       이미지가 작을 때 오른쪽 빈 공간 클릭도 .se-component 가
      //       이벤트 타겟이 되어 SunEditor 가 이미지를 선택함.
      //       SunEditor 는 click 뿐 아니라 mousedown 에서도 반응하므로
      //       두 이벤트 모두 capture 단계에서 차단해야 함.
      //
      // 해결: wysiwyg 에 capture 단계 리스너(mousedown + click)를 달아,
      //       클릭 좌표가 실제 <img> 픽셀 영역 밖이면 이미지 선택 차단.
      const wysiwyg = editor.core.context.element.wysiwyg;

      function blockOutsideImageEvent(e) {
        // 이미지 컨테이너(.se-component) 또는 figure 에 해당하는지 확인
        const comp = e.target.closest('.se-component, figure');
        if (!comp) return; // 이미지 영역과 무관 → 간섭하지 않음

        const img = comp.querySelector('img');
        if (!img) return; // 이미지 없는 컴포넌트 → 간섭하지 않음

        const r = img.getBoundingClientRect();
        const insideImg = e.clientX >= r.left && e.clientX <= r.right
                && e.clientY >= r.top  && e.clientY <= r.bottom;

        if (!insideImg) {
          // 이미지 픽셀 밖 클릭 → SunEditor 의 이미지 선택 로직 차단
          e.stopImmediatePropagation();
          // 이미 선택된 이미지 컨트롤러가 열려 있으면 닫기
          if (editor.core.currentFileComponentInfo) {
            editor.core.controllersOff();
          }
          // mousedown 을 막은 경우 브라우저 커서 이동이 안 될 수 있으므로
          // 클릭 좌표에 직접 캐럿(커서)을 배치
          if (e.type === 'mousedown') {
            requestAnimationFrame(function() {
              let node = null, offset = 0;
              if (document.caretPositionFromPoint) {
                const pos = document.caretPositionFromPoint(e.clientX, e.clientY);
                if (pos) { node = pos.offsetNode; offset = pos.offset; }
              } else if (document.caretRangeFromPoint) {
                const range = document.caretRangeFromPoint(e.clientX, e.clientY);
                if (range) { node = range.startContainer; offset = range.startOffset; }
              }
              if (node) {
                const range = document.createRange();
                range.setStart(node, offset);
                range.collapse(true);
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
                editor.core.focus();
              }
            });
          }
        }
      }

      // mousedown: SunEditor 의 이미지 선택 시작 차단
      // click: 혹시 남아있는 click 핸들러도 차단
      wysiwyg.addEventListener('mousedown', blockOutsideImageEvent, true);
      wysiwyg.addEventListener('click',     blockOutsideImageEvent, true);

      // ── 이미지 업로드 후 커서 탈출 보장 ───────────────────────────────
      editor.onImageUpload = function(targetElement, index, state) {
        if (state !== 'create') return;
        setTimeout(function() {
          const last = wysiwyg.lastElementChild;
          if (last && (last.tagName === 'FIGURE' || last.classList.contains('se-component'))) {
            const p = document.createElement('p');
            p.innerHTML = '<br>';
            wysiwyg.appendChild(p);
            const range = document.createRange();
            range.setStart(p, 0);
            range.collapse(true);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
            editor.core.focus();
          }
        }, 50);
      };

      initFileUpload(initialFiles);

      document.getElementById('boardForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        // SunEditor 내용을 textarea에 반영
        document.getElementById('editor-content').value = editor.getContents();

        const fd = new FormData(this);
        getNewFiles().forEach(f => fd.append('newFiles', f));
        getExistingFilePaths().forEach(p => fd.append('existingFilePaths', p));

        const res = await fetch(this.getAttribute('action'), { method: 'POST', body: fd });
        if (res.redirected) {
          window.location.href = res.url;
        } else {
          document.open();
          document.write(await res.text());
          document.close();
        }
      });
    });

  </script>
  <script src="/js/fileupload.js"></script>

</div>

</body>
</html>
